<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="生产数据看板，每日记录生产数量、外观不良、功能不良、人数、工时，自动计算不良品率和UPPH，折线图趋势分析">
    <title>生产数据看板 · UPPH与不良品率追踪</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.8/dist/chart.umd.min.js">
    </script>
    <style>
        :root {
            --bg: #f2f2f7;
            --card-bg: #ffffff;
            --border: #e0e0e0;
            --blue: #007AFF;
            --red: #FF3B30;
            --orange: #FF9500;
            --green: #34C759;
            --purple: #AF52DE;
            --teal: #5AC8FA;
            --text: #000000;
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.06);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.08);
            --radius-sm: 10px;
            --radius-md: 16px;
            --radius-lg: 20px;
            --font: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', 'PingFang SC', 'Helvetica Neue', sans-serif;
            --transition: 0.2s cubic-bezier(0.25, 0.1, 0.25, 1);
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: var(--font);
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 16px 12px 40px;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            user-select: none;
            -webkit-user-select: none;
        }
        .app-container {
            width: 100%;
            max-width: 1050px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .nav-bar {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            padding: 14px 20px;
            box-shadow: var(--shadow-sm);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
            border: 1px solid var(--border);
        }
        .nav-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .nav-left .icon-chart {
            font-size: 24px;
            line-height: 1;
        }
        .nav-left h1 {
            font-size: 18px;
            font-weight: 700;
            color: #000000;
            letter-spacing: -0.2px;
        }
        .nav-right {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 4px;
            font-size: 12px;
            font-weight: 500;
            color: #000000;
            opacity: 0.8;
            line-height: 1.4;
        }
        .nav-right .maker-line {
            white-space: nowrap;
        }
        .nav-right .version-line {
            font-weight: 600;
            margin-top: 2px;
        }
        .chart-card {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            padding: 16px 14px 10px;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border);
        }
        .chart-wrapper {
            width: 100%;
            height: 380px;
        }
        .chart-wrapper canvas {
            width: 100% !important;
            height: 100% !important;
        }
        .chart-legend-hint {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            justify-content: center;
            margin-top: 6px;
            font-size: 11px;
            color: #000000;
        }
        .chart-legend-hint span {
            display: flex;
            align-items: center;
            gap: 5px;
            font-weight: 500;
        }
        .dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }
        .dot-blue { background: #007AFF; }
        .dot-red { background: #FF3B30; }
        .dot-orange { background: #FF9500; }
        .dot-green { background: #34C759; }
        .dot-purple { background: #AF52DE; }
        .dot-teal { background: #5AC8FA; }
        .data-card {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            padding: 16px 14px;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }
        .section-title {
            font-size: 16px;
            font-weight: 700;
            color: #000000;
            display: flex;
            align-items: center;
            gap: 7px;
        }
        .section-title .icon {
            font-size: 18px;
        }
        .search-box {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #f5f5f7;
            border-radius: 20px;
            padding: 6px 14px;
            border: 1px solid #d0d0d0;
            flex: 1;
            max-width: 260px;
        }
        .search-box input {
            border: none;
            background: transparent;
            outline: none;
            font-size: 13px;
            font-family: var(--font);
            color: #000000;
            width: 100%;
        }
        .search-box input::placeholder {
            color: #8e8e93;
        }
        .search-icon {
            font-size: 14px;
            opacity: 0.6;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 10px 18px;
            border-radius: 24px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            color: #ffffff;
            background: var(--blue);
            letter-spacing: -0.1px;
            transition: all var(--transition);
            font-family: var(--font);
            white-space: nowrap;
            box-shadow: 0 2px 8px rgba(0, 122, 255, 0.25);
        }
        .btn:hover {
            background: #0066d6;
            box-shadow: 0 4px 14px rgba(0, 122, 255, 0.35);
            transform: translateY(-1px);
        }
        .btn:active {
            transform: scale(0.96);
            box-shadow: 0 1px 4px rgba(0, 122, 255, 0.2);
            transition: 0.1s;
        }
        .btn-delete {
            background: #ffffff;
            color: #000000;
            border: 1.5px solid #d0d0d0;
            box-shadow: none;
            padding: 7px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
        }
        .btn-delete:hover {
            background: #f5f5f5;
            border-color: #b0b0b0;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
            transform: translateY(-1px);
        }
        .btn-delete:active {
            background: #e8e8e8;
            transform: scale(0.95);
        }
        .table-scroll {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: #fafafa;
        }
        .table-scroll::-webkit-scrollbar {
            height: 4px;
        }
        .table-scroll::-webkit-scrollbar-track {
            background: transparent;
        }
        .table-scroll::-webkit-scrollbar-thumb {
            background: #c8c8c8;
            border-radius: 4px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 950px;
            font-size: 13px;
            color: #000000;
        }
        table thead th {
            background: #f5f5f7;
            padding: 11px 6px;
            text-align: center;
            font-weight: 700;
            font-size: 12px;
            color: #000000;
            border-bottom: 2px solid #d0d0d0;
            white-space: nowrap;
        }
        table tbody td {
            padding: 7px 4px;
            text-align: center;
            border-bottom: 1px solid #ececec;
            background: #ffffff;
            transition: background 0.15s;
        }
        table tbody tr:hover td {
            background: #f9f9fb;
        }
        table tbody tr:last-child td {
            border-bottom: none;
        }
        table input[type="date"],
        table input[type="number"] {
            width: 100%;
            min-width: 60px;
            max-width: 120px;
            padding: 8px 4px;
            border: 1.5px solid #dcdcdc;
            border-radius: 8px;
            font-size: 12px;
            font-family: var(--font);
            color: #000000;
            background: #ffffff;
            text-align: center;
            transition: all var(--transition);
            -webkit-appearance: none;
            appearance: none;
        }
        table input[type="date"] {
            min-width: 115px;
            max-width: 135px;
            cursor: pointer;
        }
        table input[type="number"] {
            cursor: text;
        }
        table input:focus {
            outline: none;
            border-color: var(--blue);
            box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.12);
            background: #fefefe;
        }
        table input:hover {
            border-color: #b8b8b8;
        }
        table input:focus:hover {
            border-color: var(--blue);
        }
        .cell-calculated {
            display: inline-block;
            padding: 7px 8px;
            border-radius: 8px;
            background: #f0f0f3;
            font-weight: 600;
            font-size: 13px;
            color: #000000;
            min-width: 50px;
        }
        .cell-calculated.rate {
            background: #fff3e8;
        }
        .cell-calculated.upph {
            background: #eaf7ee;
        }
        .cell-calculated.total-defect {
            background: #f5e6f5;
        }
        .no-data-msg {
            text-align: center;
            padding: 30px;
            color: #000000;
            font-size: 14px;
            font-weight: 500;
            opacity: 0.6;
        }
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-120px);
            background: #1c1c1e;
            color: #ffffff;
            padding: 10px 22px;
            border-radius: 24px;
            font-size: 14px;
            font-weight: 600;
            z-index: 9999;
            pointer-events: none;
            opacity: 0;
            transition: all 0.35s cubic-bezier(0.25, 0.1, 0.25, 1);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
            font-family: var(--font);
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
        @media (max-width: 700px) {
            .chart-wrapper {
                height: 260px;
            }
            .nav-left h1 {
                font-size: 16px;
            }
            .btn {
                padding: 8px 12px;
                font-size: 13px;
            }
            .btn-delete {
                padding: 5px 8px;
                font-size: 11px;
            }
            table {
                font-size: 11px;
                min-width: 780px;
            }
            table input[type="date"],
            table input[type="number"] {
                font-size: 10px;
                min-width: 50px;
                padding: 5px 2px;
            }
            table input[type="date"] {
                min-width: 90px;
                max-width: 110px;
            }
            .cell-calculated {
                font-size: 10px;
                padding: 4px 5px;
            }
            .search-box {
                max-width: 160px;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="nav-bar">
            <div class="nav-left">
                <span class="icon-chart"></span>
                <h1>DL生产数据看板</h1>
            </div>
            <div class="nav-right">
                <span class="maker-line">软件制作人：陈港华</span>
                <span class="maker-line">制作日期：2021-12-7</span>
                <span class="version-line">V2.0.0</span>
            </div>
        </div>
        <div class="chart-card">
            <div class="chart-wrapper">
                <canvas id="mainChart"></canvas>
            </div>
            <div class="chart-legend-hint">
                <span><span class="dot dot-blue"></span> 生产数量</span>
                <span><span class="dot dot-purple"></span> 外观不良</span>
                <span><span class="dot dot-teal"></span> 功能不良</span>
                <span><span class="dot dot-red"></span> 不良品总数</span>
                <span><span class="dot dot-orange"></span> 不良品率 (%)</span>
                <span><span class="dot dot-green"></span> UPPH</span>
            </div>
        </div>
        <div class="data-card">
            <div class="section-header">
                <div class="section-title">
                    <span class="icon"></span> 每日生产记录
                </div>
                <div class="search-box">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="searchInput" placeholder="搜索" autocomplete="off">
                </div>
                <button class="btn" id="btnAdd">
                    <span>＋</span> 添加记录
                </button>
            </div>
            <div class="table-scroll" id="tableScroll">
                <table id="dataTable">
                    <thead>
                        <tr>
                            <th>日期</th>
                            <th>生产数量</th>
                            <th>外观不良</th>
                            <th>功能不良</th>
                            <th>不良品总数</th>
                            <th>不良品率</th>
                            <th>人数</th>
                            <th>工时 (h)</th>
                            <th>UPPH</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
            <div class="no-data-msg" id="noDataMsg" style="display:none;">暂无记录，点击"添加记录"开始录入数据</div>
        </div>
    </div>
    <div class="toast" id="toast"></div>
    <script>
        (function() {
            const tableBody = document.getElementById('tableBody');
            const noDataMsg = document.getElementById('noDataMsg');
            const tableScroll = document.getElementById('tableScroll');
            const btnAdd = document.getElementById('btnAdd');
            const toastEl = document.getElementById('toast');
            const chartCanvas = document.getElementById('mainChart');
            const searchInput = document.getElementById('searchInput');
            const STORAGE_KEY = 'production_data_v4';
            let records = [];
            let nextId = 1;
            let chartInstance = null;
            let debounceTimer = null;
            let isRenderingTable = false;
            let filterText = '';

            function showToast(msg, duration = 1800) {
                if (window.toastTimer) clearTimeout(window.toastTimer);
                toastEl.textContent = msg;
                toastEl.classList.add('show');
                window.toastTimer = setTimeout(() => {
                    toastEl.classList.remove('show');
                    window.toastTimer = null;
                }, duration);
            }

            function calcTotalDefect(cosmetic, functional) {
                return (parseFloat(cosmetic) || 0) + (parseFloat(functional) || 0);
            }

            function calcDefectRate(productionQty, totalDefect) {
                const p = parseFloat(productionQty) || 0;
                if (p <= 0) return null;
                return (totalDefect / p) * 100;
            }

            function calcUPPH(productionQty, workers, hours) {
                const p = parseFloat(productionQty) || 0;
                const w = parseFloat(workers) || 0;
                const h = parseFloat(hours) || 0;
                const denominator = w * h;
                if (denominator <= 0) return null;
                return p / denominator;
            }

            function formatRate(val) {
                if (val === null || val === undefined || isNaN(val)) return '-';
                return val.toFixed(2) + '%';
            }

            function formatUPPH(val) {
                if (val === null || val === undefined || isNaN(val)) return '-';
                return val.toFixed(2);
            }

            function loadFromStorage() {
                try {
                    const raw = localStorage.getItem(STORAGE_KEY);
                    if (raw) {
                        const parsed = JSON.parse(raw);
                        if (Array.isArray(parsed) && parsed.length > 0) {
                            records = parsed;
                            let maxId = 0;
                            records.forEach(r => { if (r.id && r.id > maxId) maxId = r.id; });
                            nextId = maxId + 1;
                            records.forEach(r => {
                                r.productionQty = r.productionQty ?? 0;
                                r.cosmeticDefect = r.cosmeticDefect ?? 0;
                                r.functionalDefect = r.functionalDefect ?? 0;
                                r.workers = r.workers ?? 0;
                                r.hours = r.hours ?? 0;
                                r.date = r.date || '';
                            });
                            dedupeAndSort();
                            return;
                        }
                    }
                } catch (e) {}
                initDemoData();
            }

            function saveToStorage() {
                try {
                    const toSave = records.map(r => ({
                        id: r.id,
                        date: r.date,
                        productionQty: r.productionQty,
                        cosmeticDefect: r.cosmeticDefect,
                        functionalDefect: r.functionalDefect,
                        workers: r.workers,
                        hours: r.hours,
                    }));
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(toSave));
                } catch (e) {
                    showToast('⚠️ 数据保存失败');
                }
            }

            function dedupeAndSort() {
                const map = new Map();
                records.forEach(r => {
                    const d = r.date || '';
                    if (!d) return;
                    if (!map.has(d) || r.id > map.get(d).id) {
                        map.set(d, r);
                    }
                });
                records = Array.from(map.values());
                records.sort((a, b) => (a.date || '').localeCompare(b.date || ''));
                let maxId = 0;
                records.forEach(r => { if (r.id > maxId) maxId = r.id; });
                nextId = Math.max(nextId, maxId + 1);
            }

            function initDemoData() {
                const today = new Date();
                records = [];
                let demoId = 1;
                for (let i = 6; i >= 0; i--) {
                    const d = new Date(today);
                    d.setDate(d.getDate() - i);
                    const dateStr = d.toISOString().split('T')[0];
                    const prod = Math.floor(Math.random() * 400) + 300;
                    const cosmetic = Math.floor(Math.random() * 15) + 1;
                    const functional = Math.floor(Math.random() * 15) + 1;
                    records.push({
                        id: demoId,
                        date: dateStr,
                        productionQty: prod,
                        cosmeticDefect: cosmetic,
                        functionalDefect: functional,
                        workers: Math.floor(Math.random() * 3) + 3,
                        hours: Math.floor(Math.random() * 3) + 6,
                    });
                    demoId++;
                }
                nextId = demoId;
                dedupeAndSort();
                saveToStorage();
            }

            function getFilteredRecords() {
                if (!filterText.trim()) return records;
                const lower = filterText.trim().toLowerCase();
                return records.filter(r => (r.date || '').toLowerCase().includes(lower));
            }

            function renderTable() {
                isRenderingTable = true;
                tableBody.innerHTML = '';
                const filtered = getFilteredRecords();
                if (filtered.length === 0) {
                    noDataMsg.style.display = 'block';
                    tableScroll.style.display = 'none';
                    isRenderingTable = false;
                    return;
                }
                noDataMsg.style.display = 'none';
                tableScroll.style.display = 'block';
                filtered.forEach(r => {
                    const totalDefect = calcTotalDefect(r.cosmeticDefect, r.functionalDefect);
                    const defectRate = calcDefectRate(r.productionQty, totalDefect);
                    const upph = calcUPPH(r.productionQty, r.workers, r.hours);
                    const tr = document.createElement('tr');
                    tr.setAttribute('data-record-id', r.id);
                    tr.innerHTML = `
                        <td><input type="date" class="inp-date" value="${escapeHTML(r.date || '')}" data-field="date" data-id="${r.id}"></td>
                        <td><input type="number" class="inp-num inp-prod" value="${r.productionQty ?? 0}" min="0" step="1" data-field="productionQty" data-id="${r.id}"></td>
                        <td><input type="number" class="inp-num inp-cosmetic" value="${r.cosmeticDefect ?? 0}" min="0" step="1" data-field="cosmeticDefect" data-id="${r.id}"></td>
                        <td><input type="number" class="inp-num inp-functional" value="${r.functionalDefect ?? 0}" min="0" step="1" data-field="functionalDefect" data-id="${r.id}"></td>
                        <td><span class="cell-calculated total-defect" data-calc="totalDefect" data-id="${r.id}">${totalDefect}</span></td>
                        <td><span class="cell-calculated rate" data-calc="defectRate" data-id="${r.id}">${formatRate(defectRate)}</span></td>
                        <td><input type="number" class="inp-num inp-workers" value="${r.workers ?? 0}" min="0" step="1" data-field="workers" data-id="${r.id}"></td>
                        <td><input type="number" class="inp-num inp-hours" value="${r.hours ?? 0}" min="0" step="0.5" data-field="hours" data-id="${r.id}"></td>
                        <td><span class="cell-calculated upph" data-calc="upph" data-id="${r.id}">${formatUPPH(upph)}</span></td>
                        <td><button class="btn-delete btn-del-row" data-id="${r.id}"> 删除</button></td>
                    `;
                    tableBody.appendChild(tr);
                });
                bindTableEvents();
                isRenderingTable = false;
            }

            function escapeHTML(str) {
                return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
            }

            function bindTableEvents() {
                tableBody.querySelectorAll('input').forEach(inp => {
                    const newInp = inp.cloneNode(true);
                    inp.parentNode.replaceChild(newInp, inp);
                    newInp.addEventListener('input', function() {
                        handleInputChange(this);
                    });
                    newInp.addEventListener('change', function() {
                        handleInputBlur(this);
                    });
                    newInp.addEventListener('focus', function() {
                        this.select();
                    });
                });
                tableBody.querySelectorAll('.btn-del-row').forEach(btn => {
                    const newBtn = btn.cloneNode(true);
                    btn.parentNode.replaceChild(newBtn, btn);
                    newBtn.addEventListener('click', function() {
                        handleDeleteRow(parseInt(this.getAttribute('data-id')));
                    });
                });
            }

            function updateCalcDisplayForRow(rid) {
                const tr = tableBody.querySelector(`tr[data-record-id="${rid}"]`);
                if (!tr) return;
                const prod = parseFloat(tr.querySelector('.inp-prod')?.value) || 0;
                const cosmetic = parseFloat(tr.querySelector('.inp-cosmetic')?.value) || 0;
                const functional = parseFloat(tr.querySelector('.inp-functional')?.value) || 0;
                const workers = parseFloat(tr.querySelector('.inp-workers')?.value) || 0;
                const hours = parseFloat(tr.querySelector('.inp-hours')?.value) || 0;
                const total = cosmetic + functional;
                const rate = calcDefectRate(prod, total);
                const upph = calcUPPH(prod, workers, hours);
                const totalSpan = tr.querySelector('[data-calc="totalDefect"]');
                const rateSpan = tr.querySelector('[data-calc="defectRate"]');
                const upphSpan = tr.querySelector('[data-calc="upph"]');
                if (totalSpan) totalSpan.textContent = total;
                if (rateSpan) rateSpan.textContent = formatRate(rate);
                if (upphSpan) upphSpan.textContent = formatUPPH(upph);
            }

            function handleInputChange(inputEl) {
                if (isRenderingTable) return;
                const rid = parseInt(inputEl.getAttribute('data-id'));
                updateCalcDisplayForRow(rid);
                if (debounceTimer) clearTimeout(debounceTimer);
                debounceTimer = setTimeout(() => {
                    syncAllDataFromDOM();
                    dedupeAndSort();
                    saveToStorage();
                    updateChart();
                    if (inputEl.getAttribute('data-field') === 'date') {
                        renderTable();
                        updateChart();
                    }
                    debounceTimer = null;
                }, 180);
            }

            function handleInputBlur(inputEl) {
                if (isRenderingTable) return;
                if (debounceTimer) clearTimeout(debounceTimer);
                debounceTimer = null;
                syncAllDataFromDOM();
                dedupeAndSort();
                saveToStorage();
                updateChart();
                if (inputEl.getAttribute('data-field') === 'date') {
                    renderTable();
                    updateChart();
                }
            }

            function syncAllDataFromDOM() {
                if (isRenderingTable) return;
                const allTrs = tableBody.querySelectorAll('tr[data-record-id]');
                const tempRecords = [];
                allTrs.forEach(tr => {
                    const rid = parseInt(tr.getAttribute('data-record-id'));
                    const dateVal = tr.querySelector('.inp-date')?.value || '';
                    if (!dateVal) return;
                    tempRecords.push({
                        id: rid,
                        date: dateVal,
                        productionQty: parseFloat(tr.querySelector('.inp-prod')?.value) || 0,
                        cosmeticDefect: parseFloat(tr.querySelector('.inp-cosmetic')?.value) || 0,
                        functionalDefect: parseFloat(tr.querySelector('.inp-functional')?.value) || 0,
                        workers: parseFloat(tr.querySelector('.inp-workers')?.value) || 0,
                        hours: parseFloat(tr.querySelector('.inp-hours')?.value) || 0,
                    });
                });
                records = tempRecords;
                dedupeAndSort();
            }

            function handleDeleteRow(rid) {
                if (isRenderingTable) return;
                const idx = records.findIndex(r => r.id === rid);
                if (idx === -1) return;
                const record = records[idx];
                if (!confirm(`确定要删除 ${record.date || '未知日期'} 的记录吗？`)) return;
                records.splice(idx, 1);
                dedupeAndSort();
                saveToStorage();
                renderTable();
                updateChart();
                showToast('记录已删除');
            }

            function addNewRecord() {
                syncAllDataFromDOM();
                dedupeAndSort();
                const todayStr = new Date().toISOString().split('T')[0];
                const existing = records.find(r => r.date === todayStr);
                if (existing) {
                    showToast('今天已有记录');
                    searchInput.value = '';
                    filterText = '';
                    renderTable();
                    setTimeout(() => {
                        const tr = tableBody.querySelector(`tr[data-record-id="${existing.id}"]`);
                        if (tr) {
                            tr.scrollIntoView({ behavior: 'smooth', block: 'center' });
                            tr.style.backgroundColor = '#fffde7';
                            setTimeout(() => { tr.style.backgroundColor = ''; }, 2000);
                        }
                    }, 100);
                    updateChart();
                    return;
                }
                const newRecord = {
                    id: nextId,
                    date: todayStr,
                    productionQty: 0,
                    cosmeticDefect: 0,
                    functionalDefect: 0,
                    workers: 0,
                    hours: 0,
                };
                nextId++;
                records.push(newRecord);
                dedupeAndSort();
                saveToStorage();
                searchInput.value = '';
                filterText = '';
                renderTable();
                updateChart();
                setTimeout(() => {
                    const tr = tableBody.querySelector(`tr[data-record-id="${newRecord.id}"]`);
                    if (tr) {
                        tr.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        tr.style.backgroundColor = '#e8f5e9';
                        setTimeout(() => { tr.style.backgroundColor = ''; }, 2200);
                        const firstInput = tr.querySelector('input');
                        if (firstInput) firstInput.focus();
                    }
                }, 100);
                showToast('已添加新记录');
            }

            btnAdd.addEventListener('click', addNewRecord);
            searchInput.addEventListener('input', function() {
                filterText = this.value;
                renderTable();
            });

            document.addEventListener('keydown', function(e) {
                if ((e.ctrlKey || e.metaKey) && e.key === 'n') {
                    e.preventDefault();
                    addNewRecord();
                }
                if ((e.ctrlKey || e.metaKey) && e.key === 's') {
                    e.preventDefault();
                    syncAllDataFromDOM();
                    dedupeAndSort();
                    saveToStorage();
                    updateChart();
                    showToast('数据已保存');
                }
            });

            function updateChart() {
                if (!chartInstance) initChart();
                const chartData = prepareChartData();
                chartInstance.data.labels = chartData.labels;
                chartInstance.data.datasets[0].data = chartData.productionData;
                chartInstance.data.datasets[1].data = chartData.cosmeticDefectData;
                chartInstance.data.datasets[2].data = chartData.functionalDefectData;
                chartInstance.data.datasets[3].data = chartData.totalDefectData;
                chartInstance.data.datasets[4].data = chartData.defectRateData;
                chartInstance.data.datasets[5].data = chartData.upphData;
                chartInstance.update('default');
            }

            function prepareChartData() {
                const labels = [];
                const productionData = [];
                const cosmeticDefectData = [];
                const functionalDefectData = [];
                const totalDefectData = [];
                const defectRateData = [];
                const upphData = [];
                records.forEach(r => {
                    if (!r.date) return;
                    labels.push(r.date);
                    productionData.push(parseFloat(r.productionQty) || 0);
                    const cosmetic = parseFloat(r.cosmeticDefect) || 0;
                    const functional = parseFloat(r.functionalDefect) || 0;
                    const total = cosmetic + functional;
                    cosmeticDefectData.push(cosmetic);
                    functionalDefectData.push(functional);
                    totalDefectData.push(total);
                    const rate = calcDefectRate(r.productionQty, total);
                    defectRateData.push(rate !== null ? parseFloat(rate.toFixed(2)) : null);
                    const upph = calcUPPH(r.productionQty, r.workers, r.hours);
                    upphData.push(upph !== null ? parseFloat(upph.toFixed(2)) : null);
                });
                return { labels, productionData, cosmeticDefectData, functionalDefectData, totalDefectData, defectRateData, upphData };
            }

            function initChart() {
                if (chartInstance) chartInstance.destroy();
                const ctx = chartCanvas.getContext('2d');
                const chartData = prepareChartData();
                chartInstance = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: chartData.labels,
                        datasets: [
                            {
                                label: '生产数量',
                                data: chartData.productionData,
                                borderColor: '#007AFF',
                                backgroundColor: 'rgba(0,122,255,0.06)',
                                borderWidth: 2.5,
                                tension: 0.35,
                                fill: true,
                                pointRadius: 4,
                                pointHoverRadius: 7,
                                pointBackgroundColor: '#007AFF',
                                pointBorderColor: '#ffffff',
                                pointBorderWidth: 2,
                                yAxisID: 'y',
                            },
                            {
                                label: '外观不良',
                                data: chartData.cosmeticDefectData,
                                borderColor: '#AF52DE',
                                backgroundColor: 'rgba(175,82,222,0.04)',
                                borderWidth: 2.5,
                                tension: 0.35,
                                fill: false,
                                pointRadius: 4,
                                pointHoverRadius: 7,
                                pointBackgroundColor: '#AF52DE',
                                pointBorderColor: '#ffffff',
                                pointBorderWidth: 2,
                                yAxisID: 'y',
                            },
                            {
                                label: '功能不良',
                                data: chartData.functionalDefectData,
                                borderColor: '#5AC8FA',
                                backgroundColor: 'rgba(90,200,250,0.04)',
                                borderWidth: 2.5,
                                tension: 0.35,
                                fill: false,
                                pointRadius: 4,
                                pointHoverRadius: 7,
                                pointBackgroundColor: '#5AC8FA',
                                pointBorderColor: '#ffffff',
                                pointBorderWidth: 2,
                                yAxisID: 'y',
                            },
                            {
                                label: '不良品总数',
                                data: chartData.totalDefectData,
                                borderColor: '#FF3B30',
                                backgroundColor: 'rgba(255,59,48,0.03)',
                                borderWidth: 2.5,
                                borderDash: [4, 2],
                                tension: 0.35,
                                fill: false,
                                pointRadius: 4,
                                pointHoverRadius: 7,
                                pointBackgroundColor: '#FF3B30',
                                pointBorderColor: '#ffffff',
                                pointBorderWidth: 2,
                                yAxisID: 'y',
                            },
                            {
                                label: '不良品率 (%)',
                                data: chartData.defectRateData,
                                borderColor: '#FF9500',
                                backgroundColor: 'rgba(255,149,0,0.03)',
                                borderWidth: 2.5,
                                borderDash: [6, 2],
                                tension: 0.35,
                                fill: false,
                                pointRadius: 4,
                                pointHoverRadius: 7,
                                pointBackgroundColor: '#FF9500',
                                pointBorderColor: '#ffffff',
                                pointBorderWidth: 2,
                                yAxisID: 'y1',
                            },
                            {
                                label: 'UPPH',
                                data: chartData.upphData,
                                borderColor: '#34C759',
                                backgroundColor: 'rgba(52,199,89,0.03)',
                                borderWidth: 2.5,
                                borderDash: [3, 3],
                                tension: 0.35,
                                fill: false,
                                pointRadius: 4,
                                pointHoverRadius: 7,
                                pointBackgroundColor: '#34C759',
                                pointBorderColor: '#ffffff',
                                pointBorderWidth: 2,
                                yAxisID: 'y1',
                            },
                        ],
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        interaction: { mode: 'index', intersect: false },
                        plugins: {
                            legend: {
                                display: true,
                                position: 'top',
                                align: 'center',
                                labels: {
                                    color: '#000000',
                                    usePointStyle: true,
                                    pointStyleWidth: 10,
                                    padding: 14,
                                    font: { family: "system-ui", size: 11, weight: '600' },
                                    boxWidth: 10,
                                    boxHeight: 10,
                                },
                            },
                            tooltip: {
                                backgroundColor: '#1c1c1e',
                                titleColor: '#ffffff',
                                bodyColor: '#ffffff',
                                borderColor: 'transparent',
                                borderWidth: 0,
                                padding: 12,
                                cornerRadius: 10,
                                titleFont: { family: "system-ui", size: 13, weight: '700' },
                                bodyFont: { family: "system-ui", size: 12, weight: '500' },
                                callbacks: {
                                    label: function(context) {
                                        let label = context.dataset.label || '';
                                        if (label) label += ': ';
                                        const val = context.parsed.y;
                                        if (context.dataset.label.includes('率')) label += val.toFixed(2) + '%';
                                        else if (context.dataset.label === 'UPPH') label += val.toFixed(2);
                                        else label += Math.round(val);
                                        return label;
                                    }
                                }
                            },
                        },
                        scales: {
                            x: {
                                title: { display: true, text: '日期', color: '#000000', font: { size: 12, weight: '700' } },
                                ticks: { color: '#000000', maxRotation: 45 },
                                grid: { color: 'rgba(0,0,0,0.06)', drawBorder: false },
                            },
                            y: {
                                type: 'linear',
                                position: 'left',
                                title: { display: true, text: '数量', color: '#000000', font: { size: 12, weight: '700' } },
                                ticks: { color: '#000000', callback: (val) => Math.round(val) },
                                grid: { color: 'rgba(0,0,0,0.06)', drawBorder: false },
                                beginAtZero: true,
                            },
                            y1: {
                                type: 'linear',
                                position: 'right',
                                title: { display: true, text: '比率 / UPPH', color: '#000000', font: { size: 12, weight: '700' } },
                                ticks: { color: '#000000', callback: (val) => val.toFixed(1) },
                                grid: { display: false, drawBorder: false },
                                beginAtZero: true,
                            },
                        },
                    },
                });
            }

            window.addEventListener('resize', () => {
                if (window.resizeDebounce) clearTimeout(window.resizeDebounce);
                window.resizeDebounce = setTimeout(() => {
                    if (chartInstance) chartInstance.resize();
                }, 200);
            });

            function init() {
                loadFromStorage();
                renderTable();
                initChart();
                updateChart();
                if (records.length === 0) {
                    noDataMsg.style.display = 'block';
                    tableScroll.style.display = 'none';
                }
            }
            init();
        })();
    </script>
</body>
</html>
