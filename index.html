<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生产数据看板 v2.5.9</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.8/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #f2f2f7; --card-bg: #ffffff; --border: #e0e0e0;
            --blue: #007AFF; --red: #FF3B30; --text: #000000;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
            --radius-lg: 20px;
            --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
        }
        *{ margin:0; padding:0; box-sizing:border-box; }
        body{ font-family:var(--font); background:var(--bg); color:var(--text); padding:16px 12px 40px; display:flex; justify-content:center; }
        .app{ width:100%; max-width:1400px; display:flex; flex-direction:column; gap:16px; }

        .tabs-bar{ display:flex; flex-wrap:wrap; gap:8px; align-items:center; background:var(--card-bg); border-radius:var(--radius-lg); padding:10px 16px; box-shadow:var(--shadow-sm); border:1px solid var(--border); }
        .tab{ padding:8px 16px; border-radius:20px; background:#f0f0f3; font-size:14px; font-weight:600; cursor:pointer; border:none; color:var(--text); white-space:nowrap; transition:all 0.2s; display:flex; align-items:center; gap:6px; }
        .tab.active{ background:var(--blue); color:#fff; }
        .tab:hover:not(.active){ background:#e5e5ea; }
        .tab .tab-name{ max-width:150px; overflow:hidden; text-overflow:ellipsis; }
        .tab .edit-tab{ font-size:12px; opacity:0.5; cursor:pointer; margin-left:4px; }
        .tab .close-tab{ margin-left:6px; font-weight:400; opacity:0.6; cursor:pointer; }
        .add-tab-btn{ padding:8px 16px; border-radius:20px; background:transparent; font-size:20px; cursor:pointer; border:2px dashed #ccc; color:#888; font-weight:600; min-width:44px; height:40px; display:flex; align-items:center; justify-content:center; }
        .add-tab-btn:hover{ border-color:var(--blue); color:var(--blue); }

        .nav-bar{ background:var(--card-bg); border-radius:var(--radius-lg); padding:14px 20px; box-shadow:var(--shadow-sm); display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:16px; border:1px solid var(--border); }
        .maker-info{ font-size:11px; opacity:0.8; text-align:right; }

        .chart-card{ background:var(--card-bg); border-radius:var(--radius-lg); padding:16px 14px 10px; box-shadow:var(--shadow-md); border:1px solid var(--border); }
        .chart-wrapper{ height:400px; }
        .toggle-panel{ display:flex; flex-wrap:wrap; gap:10px; margin-bottom:8px; font-size:12px; align-items:center; }
        .toggle-panel label{ display:flex; align-items:center; gap:4px; cursor:pointer; user-select:none; }
        .legend-dot{ display:inline-block; width:10px; height:10px; border-radius:50%; }

        .data-card{ background:var(--card-bg); border-radius:var(--radius-lg); padding:16px 14px; box-shadow:var(--shadow-md); border:1px solid var(--border); }
        .section-header{ display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; margin-bottom:12px; }
        .table-scroll{ overflow-x:auto; border-radius:10px; border:1px solid var(--border); background:#fafafa; }
        table{ width:100%; border-collapse:collapse; font-size:12px; color:#000; min-width:1200px; }
        th{ background:#f5f5f7; padding:8px 4px; font-size:11px; font-weight:700; border-bottom:2px solid #d0d0d0; white-space:nowrap; }
        td{ padding:6px 4px; text-align:center; border-bottom:1px solid #ececec; }
        td.process-name{ font-weight:600; background:#fafafa; }
        input[type="number"]{ width:65px; padding:6px 4px; border:1.5px solid #dcdcdc; border-radius:6px; font-size:12px; text-align:center; font-family:var(--font); }
        .calc-cell{ font-weight:600; white-space:nowrap; }
        .summary-row td{ background:#fff9e6; font-weight:700; }
        .no-data-msg{ text-align:center; padding:20px; opacity:0.6; }
        .toast{ position:fixed; top:20px; left:50%; transform:translateX(-50%); background:#1c1c1e; color:#fff; padding:10px 22px; border-radius:24px; font-size:14px; font-weight:600; z-index:9999; opacity:0; transition:all 0.3s; pointer-events:none; }
        .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
        .btn{ padding:8px 16px; border-radius:24px; font-size:14px; font-weight:600; border:none; cursor:pointer; background:var(--blue); color:#fff; }
        .btn-delete{ background:#fff; color:#000; border:1.5px solid #d0d0d0; padding:5px 10px; border-radius:20px; font-size:12px; cursor:pointer; }
        .sync-indicator { display:flex; align-items:center; gap:6px; font-size:12px; margin-left:12px; }
        .sync-dot { width:8px; height:8px; border-radius:50%; background:#34C759; }
        .sync-dot.syncing { background:#FF9500; animation: pulse 1s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
        @media (max-width:750px){ .chart-wrapper{ height:280px; } }
    </style>
</head>
<body>
<div class="app">
    <div class="tabs-bar" id="tabsBar"></div>
    <div class="nav-bar">
        <h2>生产数据看板</h2>
        <div style="display:flex; align-items:center; gap:20px; flex-wrap:wrap;">
            <div class="sync-indicator"><span class="sync-dot" id="syncDot"></span><span id="syncText">连接中...</span></div>
            <div class="maker-info">网页制作人：陈港华 · 2021-12-7 · v2.5.9</div>
        </div>
    </div>
    <div class="chart-card">
        <div class="toggle-panel" id="togglePanel">
            <span style="font-weight:600; margin-right:8px;">产量线：</span>
            <label><input type="checkbox" checked data-process="后焊"> 后焊</label>
            <label><input type="checkbox" checked data-process="组装"> 组装</label>
            <label><input type="checkbox" checked data-process="包装"> 包装</label>
            <label><input type="checkbox" checked data-process="total"> 总产量</label>
            <span style="margin-left:16px; font-weight:600;">其他：</span>
            <label><input type="checkbox" checked data-dataset="defect"> 外观不良</label>
            <label><input type="checkbox" checked data-dataset="func"> 功能不良</label>
            <label><input type="checkbox" checked data-dataset="totalDefect"> 不良品总数</label>
            <label><input type="checkbox" checked data-dataset="rate"> 不良品率</label>
            <label><input type="checkbox" checked data-dataset="upph"> UPPH</label>
            <label><input type="checkbox" checked data-dataset="price"> 总单价</label>
        </div>
        <div class="chart-wrapper"><canvas id="mainChart"></canvas></div>
    </div>
    <div class="data-card">
        <div class="section-header">
            <span style="font-weight:700;">每日生产记录</span>
            <button class="btn" id="btnAdd">＋ 添加一天</button>
        </div>
        <div class="table-scroll">
            <table id="dataTable">
                <thead><tr>
                    <th>日期</th><th>工序</th><th>生产数量</th><th>外观不良</th><th>功能不良</th><th>不良品率</th>
                    <th>人数</th><th>当日工时</th><th>总工时</th><th>平均小时产能</th><th>UPPH</th><th>工序单价</th><th>操作</th>
                </tr></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
        <div id="noDataMsg" style="display:none;">暂无数据，点击“添加一天”开始</div>
    </div>
</div>
<div class="toast" id="toast"></div>

<script>
(function() {
    const SUPABASE_URL = 'https://heialtqbftbmtvgemrld.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_a3OQjdShFybq73P0rzpebg_pM90NvQV';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let boards = ['陈港华', '龙波章', '戴腾昭', '蔡旺知'];
    let currentBoard = boards[0];
    let records = {};
    let chartInstance = null;
    let pendingSync = false;

    const tabsBar = document.getElementById('tabsBar');
    const tableBody = document.getElementById('tableBody');
    const noDataMsg = document.getElementById('noDataMsg');
    const toastEl = document.getElementById('toast');
    const chartCanvas = document.getElementById('mainChart');
    const syncDot = document.getElementById('syncDot');
    const syncText = document.getElementById('syncText');

    function setSyncStatus(status) {
        syncDot.className = 'sync-dot';
        if (status === 'syncing') { syncDot.classList.add('syncing'); syncText.textContent = '同步中...'; }
        else if (status === 'connected') { syncText.textContent = '已连接'; }
        else { syncDot.classList.add('error'); syncText.textContent = '离线'; }
    }

    function showToast(msg) {
        toastEl.textContent = msg; toastEl.classList.add('show');
        clearTimeout(window._toastTimer);
        window._toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2000);
    }

    async function loadBoardData(board) {
        setSyncStatus('syncing');
        try {
            const { data, error } = await supabase
                .from('production_records')
                .select('*')
                .eq('board', board)
                .order('date', { ascending: true });
            if (error) throw error;
            records[board] = data ? data.map(r => ({
                id: r.id,
                date: r.date,
                process: r.process,
                production: r.production_qty || 0,
                cosmeticDefect: r.cosmetic_defect || 0,
                functionalDefect: r.functional_defect || 0,
                workers: r.workers || 0,
                dailyHours: r.daily_hours || 0
            })) : [];
            setSyncStatus('connected');
        } catch (e) {
            console.error(e);
            setSyncStatus('error');
            records[board] = [];
        }
    }

    async function saveBoardRecords(board) {
        const rows = records[board] || [];
        if (!rows.length) return;
        const toUpsert = rows.map(r => ({
            date: r.date,
            process: r.process,
            board: board,
            production_qty: r.production,
            cosmetic_defect: r.cosmeticDefect,
            functional_defect: r.functionalDefect,
            workers: r.workers,
            daily_hours: r.dailyHours
        }));
        const { error } = await supabase.from('production_records').upsert(toUpsert, { onConflict: 'date, process, board' });
        if (error) console.error(error);
    }

    async function deleteRecordFromCloud(id) {
        await supabase.from('production_records').delete().eq('id', id);
    }

    async function handleInput(e) {
        const el = e.target;
        const date = el.dataset.date;
        const process = el.dataset.process;
        const field = el.dataset.field;
        const value = parseFloat(el.value) || 0;

        let boardData = records[currentBoard] || [];
        let row = boardData.find(r => r.date === date && r.process === process);
        if (!row) return;
        row[field] = value;
        updateRowCalcDOM(date, process);
        refreshSummaryRow(date);
        pendingSync = true;
        await saveBoardRecords(currentBoard);
        pendingSync = false;
        updateChart();
    }

    function updateRowCalcDOM(date, process) {
        const row = (records[currentBoard] || []).find(r => r.date === date && r.process === process);
        if (!row) return;
        const tr = document.getElementById(`row-${date}-${process}`);
        if (!tr) return;
        const workers = row.workers, dailyHours = row.dailyHours;
        const totalWorkHours = workers * dailyHours;
        const defectTotal = row.cosmeticDefect + row.functionalDefect;
        const defectRate = row.production > 0 ? (defectTotal / row.production * 100).toFixed(2) : '-';
        const avgHourProd = dailyHours > 0 ? row.production / dailyHours : 0;
        const upph = (workers > 0 && dailyHours > 0 && row.production > 0) ? (row.production / (workers * dailyHours)).toFixed(2) : '-';
        const unitPrice = row.production > 0 ? ((dailyHours * 20) / row.production).toFixed(2) : '-';

        tr.querySelector('.calc-rate').textContent = defectRate + (defectRate !== '-' ? '%' : '');
        tr.querySelector('.calc-total-hours').textContent = totalWorkHours.toFixed(1);
        tr.querySelector('.calc-avg-hour').textContent = avgHourProd.toFixed(2);
        tr.querySelector('.calc-upph').textContent = upph;
        tr.querySelector('.calc-unit-price').textContent = unitPrice !== '-' ? '¥' + unitPrice : '-';
    }

    function refreshSummaryRow(date) {
        const rows = (records[currentBoard] || []).filter(r => r.date === date);
        if (!rows.length) return;
        let totalProd = 0, totalCosm = 0, totalFunc = 0, totalWorkers = 0, totalDailyHours = 0, totalPrice = 0, totalWorkHours = 0;
        rows.forEach(r => {
            totalProd += r.production;
            totalCosm += r.cosmeticDefect;
            totalFunc += r.functionalDefect;
            totalWorkers += r.workers;
            totalDailyHours += r.dailyHours;
            totalWorkHours += r.workers * r.dailyHours;
            if (r.production > 0) totalPrice += (r.dailyHours * 20) / r.production;
        });
        const totalDefect = totalCosm + totalFunc;
        const rate = totalProd > 0 ? (totalDefect / totalProd * 100).toFixed(2) : '-';
        const avgHourProdSum = totalDailyHours > 0 ? totalProd / totalDailyHours : 0;
        const upphSum = (totalWorkers > 0 && totalDailyHours > 0 && totalProd > 0) ? (totalProd / (totalWorkers * totalDailyHours)).toFixed(2) : '-';

        const summaryRow = document.getElementById(`summary-${date}`);
        if (summaryRow) {
            summaryRow.querySelector('.sum-total-prod').textContent = totalProd;
            summaryRow.querySelector('.sum-cosmetic').textContent = totalCosm;
            summaryRow.querySelector('.sum-func').textContent = totalFunc;
            summaryRow.querySelector('.sum-rate').textContent = rate + (rate !== '-' ? '%' : '');
            summaryRow.querySelector('.sum-workers').textContent = totalWorkers;
            summaryRow.querySelector('.sum-dailyhours').textContent = totalDailyHours.toFixed(1);
            summaryRow.querySelector('.sum-totalhours').textContent = totalWorkHours.toFixed(1);
            summaryRow.querySelector('.sum-avg-hour-prod').textContent = avgHourProdSum.toFixed(2);
            summaryRow.querySelector('.sum-upph').textContent = upphSum;
            summaryRow.querySelector('.sum-total-price').textContent = '¥' + totalPrice.toFixed(2);
        }
    }

    async function deleteRow(date, process) {
        const row = (records[currentBoard] || []).find(r => r.date === date && r.process === process);
        if (!row) return;
        if (row.id) await deleteRecordFromCloud(row.id);
        records[currentBoard] = records[currentBoard].filter(r => !(r.date === date && r.process === process));
    }

    async function deleteDate(date) {
        const rows = (records[currentBoard] || []).filter(r => r.date === date);
        for (const r of rows) {
            if (r.id) await deleteRecordFromCloud(r.id);
        }
        records[currentBoard] = records[currentBoard].filter(r => r.date !== date);
    }

    async function renderTable() {
        const boardData = records[currentBoard] || [];
        tableBody.innerHTML = '';
        if (!boardData.length) {
            noDataMsg.style.display = 'block';
            document.getElementById('dataTable').style.display = 'none';
            return;
        }
        noDataMsg.style.display = 'none';
        document.getElementById('dataTable').style.display = '';

        const grouped = {};
        boardData.forEach(r => {
            if (!grouped[r.date]) grouped[r.date] = [];
            grouped[r.date].push(r);
        });
        const sortedDates = Object.keys(grouped).sort();

        let html = '';
        sortedDates.forEach(date => {
            const rows = grouped[date].sort((a,b) => ['后焊','组装','包装'].indexOf(a.process) - ['后焊','组装','包装'].indexOf(b.process));
            let totalProd = 0, totalCosm = 0, totalFunc = 0, totalWorkers = 0, totalDailyHours = 0, totalPrice = 0, totalWorkHours = 0;

            rows.forEach(r => {
                const workers = r.workers, dailyHours = r.dailyHours;
                const workHours = workers * dailyHours;
                totalProd += r.production; totalCosm += r.cosmeticDefect; totalFunc += r.functionalDefect;
                totalWorkers += workers; totalDailyHours += dailyHours; totalWorkHours += workHours;
                if (r.production > 0) totalPrice += (dailyHours * 20) / r.production;

                const defectTotal = r.cosmeticDefect + r.functionalDefect;
                const defectRate = r.production > 0 ? (defectTotal / r.production * 100).toFixed(2) : '-';
                const avgHourProd = dailyHours > 0 ? r.production / dailyHours : 0;
                const upph = (workers > 0 && dailyHours > 0 && r.production > 0) ? (r.production / (workers * dailyHours)).toFixed(2) : '-';
                const unitPrice = r.production > 0 ? ((dailyHours * 20) / r.production).toFixed(2) : '-';

                html += `<tr id="row-${date}-${r.process}">
                    <td>${date}</td><td class="process-name">${r.process}</td>
                    <td><input type="number" class="inp-production" value="${r.production}" data-date="${date}" data-process="${r.process}" data-field="production"></td>
                    <td><input type="number" class="inp-cosmetic" value="${r.cosmeticDefect}" data-date="${date}" data-process="${r.process}" data-field="cosmeticDefect"></td>
                    <td><input type="number" class="inp-functional" value="${r.functionalDefect}" data-date="${date}" data-process="${r.process}" data-field="functionalDefect"></td>
                    <td class="calc-cell calc-rate">${defectRate}${defectRate !== '-' ? '%' : ''}</td>
                    <td><input type="number" class="inp-workers" value="${workers}" data-date="${date}" data-process="${r.process}" data-field="workers"></td>
                    <td><input type="number" class="inp-dailyhours" value="${dailyHours}" data-date="${date}" data-process="${r.process}" data-field="dailyHours"></td>
                    <td class="calc-cell calc-total-hours">${workHours.toFixed(1)}</td>
                    <td class="calc-cell calc-avg-hour">${avgHourProd.toFixed(2)}</td>
                    <td class="calc-cell calc-upph">${upph}</td>
                    <td class="calc-cell calc-unit-price">${unitPrice !== '-' ? '¥' + unitPrice : '-'}</td>
                    <td><button class="btn-delete delete-process" data-date="${date}" data-process="${r.process}">🗑</button></td>
                </tr>`;
            });

            const totalDefect = totalCosm + totalFunc;
            const rate = totalProd > 0 ? (totalDefect / totalProd * 100).toFixed(2) : '-';
            const avgHourProdSum = totalDailyHours > 0 ? totalProd / totalDailyHours : 0;
            const upphSum = (totalWorkers > 0 && totalDailyHours > 0 && totalProd > 0) ? (totalProd / (totalWorkers * totalDailyHours)).toFixed(2) : '-';

            html += `<tr class="summary-row" id="summary-${date}">
                <td colspan="2" style="text-align:right;">${date} 汇总</td>
                <td class="sum-total-prod"><strong>${totalProd}</strong></td>
                <td class="sum-cosmetic">${totalCosm}</td>
                <td class="sum-func">${totalFunc}</td>
                <td class="sum-rate">${rate}${rate !== '-' ? '%' : ''}</td>
                <td class="sum-workers">${totalWorkers}</td>
                <td class="sum-dailyhours">${totalDailyHours.toFixed(1)}</td>
                <td class="sum-totalhours">${totalWorkHours.toFixed(1)}</td>
                <td class="sum-avg-hour-prod">${avgHourProdSum.toFixed(2)}</td>
                <td class="sum-upph">${upphSum}</td>
                <td class="sum-total-price"><strong>¥${totalPrice.toFixed(2)}</strong></td>
                <td><button class="btn-delete delete-date" data-date="${date}">删全天</button></td>
            </tr>`;
        });

        tableBody.innerHTML = html;
        bindTableEvents();
    }

    function bindTableEvents() {
        document.querySelectorAll('input').forEach(inp => {
            inp.addEventListener('input', handleInput);
        });
        document.querySelectorAll('.delete-process').forEach(btn => {
            btn.addEventListener('click', async () => {
                const date = btn.dataset.date, process = btn.dataset.process;
                if (!confirm(`删除 ${date} ${process} 记录？`)) return;
                await deleteRow(date, process);
                await renderTable();
                updateChart();
            });
        });
        document.querySelectorAll('.delete-date').forEach(btn => {
            btn.addEventListener('click', async () => {
                const date = btn.dataset.date;
                if (!confirm(`删除 ${date} 所有记录？`)) return;
                await deleteDate(date);
                await renderTable();
                updateChart();
            });
        });
    }

    async function addDay() {
        const today = new Date().toISOString().split('T')[0];
        const existing = (records[currentBoard] || []).some(r => r.date === today);
        if (existing) { showToast('今天已有数据'); return; }
        const workers = prompt('输入当日人数（每行独立，可后续修改）：', '5');
        const dailyHours = prompt('输入当日工时（小时）：', '8');
        if (!workers || !dailyHours) return;
        const w = parseFloat(workers), h = parseFloat(dailyHours);
        if (isNaN(w) || isNaN(h)) return;
        const newRows = ['后焊','组装','包装'].map(p => ({
            date: today, process: p, production: 0, cosmeticDefect: 0, functionalDefect: 0,
            workers: w, dailyHours: h
        }));
        records[currentBoard] = (records[currentBoard] || []).concat(newRows);
        await saveBoardRecords(currentBoard);
        await loadBoardData(currentBoard);
        await renderTable();
        updateChart();
        showToast(`已添加 ${today}`);
    }

    function prepareChartData() {
        const boardData = records[currentBoard] || [];
        const dateMap = {};
        boardData.forEach(r => {
            if (!dateMap[r.date]) dateMap[r.date] = { 后焊:0, 组装:0, 包装:0, cosmetic:0, func:0, workers:0, dailyHours:0 };
            dateMap[r.date][r.process] = (dateMap[r.date][r.process] || 0) + r.production;
            dateMap[r.date].cosmetic += r.cosmeticDefect;
            dateMap[r.date].func += r.functionalDefect;
            dateMap[r.date].workers += r.workers;
            dateMap[r.date].dailyHours += r.dailyHours;
        });
        const dates = Object.keys(dateMap).sort();
        const 后焊=[], 组装=[], 包装=[], totalProd=[], cosmetic=[], func=[], totalDefect=[], defectRate=[], upph=[], totalPrice=[];
        dates.forEach(d => {
            const v = dateMap[d];
            后焊.push(v.后焊); 组装.push(v.组装); 包装.push(v.包装);
            const tp = v.后焊 + v.组装 + v.包装; totalProd.push(tp);
            cosmetic.push(v.cosmetic); func.push(v.func);
            const td = v.cosmetic + v.func; totalDefect.push(td);
            defectRate.push(tp>0 ? +(td/tp*100).toFixed(2) : null);
            upph.push(tp>0 && v.workers>0 && v.dailyHours>0 ? +(tp/(v.workers*v.dailyHours)).toFixed(2) : null);
            let price = 0;
            boardData.filter(r => r.date===d).forEach(r => { if(r.production>0) price += (r.dailyHours*20)/r.production; });
            totalPrice.push(+price.toFixed(2));
        });
        return { dates, 后焊, 组装, 包装, totalProd, cosmetic, func, totalDefect, defectRate, upph, totalPrice };
    }

    function updateChart() {
        if (!chartInstance) initChart();
        const d = prepareChartData();
        chartInstance.data.labels = d.dates;
        const sets = chartInstance.data.datasets;
        sets[0].data = d.后焊; sets[1].data = d.组装; sets[2].data = d.包装;
        sets[3].data = d.totalProd; sets[4].data = d.cosmetic; sets[5].data = d.func;
        sets[6].data = d.totalDefect; sets[7].data = d.defectRate; sets[8].data = d.upph; sets[9].data = d.totalPrice;
        chartInstance.update();
    }

    function initChart() {
        if (chartInstance) chartInstance.destroy();
        const d = prepareChartData();
        chartInstance = new Chart(chartCanvas, {
            type: 'line',
            data: {
                labels: d.dates,
                datasets: [
                    { label:'后焊产量', data:d.后焊, borderColor:'#FF9500', tension:0.3, yAxisID:'y' },
                    { label:'组装产量', data:d.组装, borderColor:'#34C759', tension:0.3, yAxisID:'y' },
                    { label:'包装产量', data:d.包装, borderColor:'#007AFF', tension:0.3, yAxisID:'y' },
                    { label:'总产量', data:d.totalProd, borderColor:'#000', borderWidth:3, tension:0.3, yAxisID:'y' },
                    { label:'外观不良', data:d.cosmetic, borderColor:'#AF52DE', tension:0.3, yAxisID:'y' },
                    { label:'功能不良', data:d.func, borderColor:'#5AC8FA', tension:0.3, yAxisID:'y' },
                    { label:'不良品总数', data:d.totalDefect, borderColor:'#FF3B30', tension:0.3, yAxisID:'y' },
                    { label:'不良品率', data:d.defectRate, borderColor:'#FF9500', borderDash:[5,2], tension:0.3, yAxisID:'y1' },
                    { label:'UPPH', data:d.upph, borderColor:'#34C759', borderDash:[3,3], tension:0.3, yAxisID:'y1' },
                    { label:'总单价', data:d.totalPrice, borderColor:'#FF2D55', borderDash:[6,2], tension:0.3, yAxisID:'y1' }
                ]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                interaction: { mode: 'index', intersect: false },
                plugins: { legend: { display: true, position: 'top', labels: { color:'#000', usePointStyle:true, boxWidth:8, font:{size:11} } } },
                scales: {
                    x: { grid: { display: false } },
                    y: { type:'linear', position:'left', title:{ display:true, text:'数量' }, beginAtZero:true },
                    y1: { type:'linear', position:'right', title:{ display:true, text:'比率/UPPH/单价' }, grid:{ display:false }, beginAtZero:true }
                }
            }
        });
        bindToggleEvents();
    }

    function bindToggleEvents() {
        document.querySelectorAll('#togglePanel input[type=checkbox]').forEach(cb => {
            cb.addEventListener('change', () => {
                if (!chartInstance) return;
                if (cb.dataset.process) {
                    const idx = { '后焊':0, '组装':1, '包装':2, 'total':3 }[cb.dataset.process];
                    chartInstance.setDatasetVisibility(idx, cb.checked);
                } else {
                    const dsMap = { 'defect':4, 'func':5, 'totalDefect':6, 'rate':7, 'upph':8, 'price':9 };
                    chartInstance.setDatasetVisibility(dsMap[cb.dataset.dataset], cb.checked);
                }
                chartInstance.update();
            });
        });
    }

    function renderTabs() {
        tabsBar.innerHTML = boards.map(b => `
            <button class="tab ${b===currentBoard?'active':''}" data-board="${b}">
                <span class="tab-name">${b}</span>
                <span class="edit-tab" title="重命名">✎</span>
                ${boards.length>1?`<span class="close-tab" title="删除">×</span>`:''}
            </button>
        `).join('') + `<button class="add-tab-btn" title="添加新页面">+</button>`;

        tabsBar.querySelectorAll('.tab').forEach(btn => {
            btn.addEventListener('click', (e) => {
                if (e.target.classList.contains('edit-tab') || e.target.classList.contains('close-tab')) return;
                switchBoard(btn.dataset.board);
            });
        });
        tabsBar.querySelectorAll('.edit-tab').forEach(span => {
            span.addEventListener('click', (e) => {
                e.stopPropagation();
                const old = span.parentElement.dataset.board;
                const newName = prompt('新名称：', old);
                if (newName && newName.trim() && newName !== old) {
                    if (boards.includes(newName.trim())) { showToast('名称已存在'); return; }
                    const data = records[old] || [];
                    delete records[old];
                    records[newName] = data;
                    boards = boards.map(b => b===old ? newName.trim() : b);
                    if (currentBoard === old) currentBoard = newName.trim();
                    renderTabs(); renderTable(); updateChart();
                    saveBoardRecords(newName);
                }
            });
        });
        tabsBar.querySelectorAll('.close-tab').forEach(span => {
            span.addEventListener('click', async (e) => {
                e.stopPropagation();
                const board = span.parentElement.dataset.board;
                if (!confirm(`删除页面“${board}”及其所有数据？`)) return;
                const rows = records[board] || [];
                for (const r of rows) if (r.id) await deleteRecordFromCloud(r.id);
                boards = boards.filter(b => b !== board);
                delete records[board];
                if (currentBoard === board) currentBoard = boards[0];
                renderTabs(); renderTable(); updateChart();
            });
        });
        document.querySelector('.add-tab-btn').addEventListener('click', () => {
            const name = prompt('新页面名称：');
            if (!name || !name.trim()) return;
            if (boards.includes(name.trim())) { showToast('已存在'); return; }
            boards.push(name.trim());
            currentBoard = name.trim();
            records[currentBoard] = [];
            renderTabs(); renderTable(); updateChart();
            showToast(`页面“${currentBoard}”已创建`);
        });
    }

    async function switchBoard(board) {
        if (board === currentBoard) return;
        currentBoard = board;
        if (!records[currentBoard]) await loadBoardData(currentBoard);
        renderTabs(); renderTable(); updateChart();
        setSyncStatus('connected');
    }

    async function init() {
        for (const b of boards) {
            await loadBoardData(b);
        }
        currentBoard = boards[0];
        renderTabs();
        await renderTable();
        initChart();
        updateChart();
        setSyncStatus('connected');

        supabase.channel('public:production_records')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'production_records' }, async () => {
                if (pendingSync) return;
                await loadBoardData(currentBoard);
                renderTable();
                updateChart();
            }).subscribe();
    }

    document.getElementById('btnAdd').addEventListener('click', addDay);
    init();
})();
</script>
</body>
</html>
