<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>技改生产数据看板</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.8/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --bg: #f2f2f7; --card-bg: #ffffff; --border: #e0e0e0;
            --blue: #007AFF; --red: #FF3B30; --text: #000000;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
            --radius-lg: 20px;
            --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
        }
        *{ margin:0; padding:0; box-sizing:border-box; }
        body{ font-family:var(--font); background:var(--bg); color:var(--text); padding:16px 12px 40px; display:flex; justify-content:center; }
        .app{ width:100%; max-width:1400px; display:flex; flex-direction:column; gap:16px; }
        .sticky-header{ position:sticky; top:0; z-index:100; background:var(--bg); padding-bottom:8px; display:flex; flex-direction:column; gap:16px; }
        .tabs-bar{ display:flex; flex-wrap:wrap; gap:8px; align-items:center; background:var(--card-bg); border-radius:var(--radius-lg); padding:10px 16px; border:1px solid var(--border); box-shadow:var(--shadow-sm); }
        .tab{ padding:8px 16px; border-radius:20px; background:#f0f0f3; font-size:14px; font-weight:600; cursor:pointer; border:none; color:var(--text); display:flex; align-items:center; gap:6px; transition:all 0.2s; }
        .tab.active{ background:var(--blue); color:#fff; }
        .tab:hover:not(.active){ background:#e5e5ea; }
        .tab .edit-tab{ font-size:12px; opacity:0.5; cursor:pointer; }
        .tab .close-tab{ font-weight:400; opacity:0.6; cursor:pointer; }
        .add-tab-btn{ padding:8px 16px; border-radius:20px; background:transparent; font-size:20px; cursor:pointer; border:2px dashed #ccc; color:#888; font-weight:600; min-width:44px; height:40px; display:flex; align-items:center; justify-content:center; }
        .add-tab-btn:hover{ border-color:var(--blue); color:var(--blue); }
        .nav-bar{ background:var(--card-bg); border-radius:var(--radius-lg); padding:14px 20px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:16px; border:1px solid var(--border); box-shadow:var(--shadow-sm); }
        .board-title{ font-size:18px; font-weight:700; outline:none; border:1px solid transparent; padding:2px 8px; border-radius:8px; min-width:150px; }
        .board-title:hover{ border-color:#ccc; }
        .board-title:focus{ border-color:var(--blue); background:#fff; }
        .sync-indicator{ display:flex; align-items:center; gap:6px; font-size:12px; }
        .sync-dot{ width:8px; height:8px; border-radius:50%; background:#34C759; }
        .sync-dot.syncing{ background:#FF9500; animation:pulse 1s infinite; }
        @keyframes pulse{ 0%,100%{opacity:1} 50%{opacity:0.3} }
        .chart-card{ background:var(--card-bg); border-radius:var(--radius-lg); padding:16px 14px 10px; border:1px solid var(--border); box-shadow:var(--shadow-md); }
        .chart-wrapper{ height:400px; }
        .toggle-panel{ display:flex; flex-wrap:wrap; gap:10px; margin-bottom:8px; font-size:12px; align-items:center; }
        .toggle-panel label{ display:flex; align-items:center; gap:4px; cursor:pointer; user-select:none; }
        .data-card{ background:var(--card-bg); border-radius:var(--radius-lg); padding:16px 14px; border:1px solid var(--border); box-shadow:var(--shadow-md); }
        .section-header{ display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; margin-bottom:12px; }
        .table-scroll{ overflow-x:auto; border-radius:10px; border:1px solid var(--border); background:#fafafa; }
        table{ width:100%; border-collapse:collapse; font-size:12px; min-width:1300px; }
        th{ background:#f5f5f7; padding:8px 4px; font-size:11px; font-weight:700; border-bottom:2px solid #d0d0d0; }
        td{ padding:6px 4px; text-align:center; border-bottom:1px solid #ececec; }
        td.process-name{ font-weight:600; background:#fafafa; }
        input[type="number"]{ width:70px; padding:6px 4px; border:1.5px solid #dcdcdc; border-radius:6px; font-size:12px; text-align:center; font-family:var(--font); }
        .calc-cell{ font-weight:600; }
        .summary-row td{ background:#fff9e6; font-weight:700; }
        .grand-total-row td{ background:#e8f0fe; font-weight:700; }
        .btn{ padding:8px 16px; border-radius:24px; font-size:14px; font-weight:600; border:none; cursor:pointer; background:var(--blue); color:#fff; }
        .btn-danger{ background:var(--red); }
        .btn-del{ background:none; border:none; cursor:pointer; font-size:16px; padding:4px 8px; border-radius:50%; transition:all 0.2s; }
        .btn-del:hover{ background:rgba(255,59,48,0.1); }
        .toast{ position:fixed; top:20px; left:50%; transform:translateX(-50%); background:#1c1c1e; color:#fff; padding:10px 22px; border-radius:24px; font-size:14px; font-weight:600; z-index:9999; opacity:0; transition:all 0.3s; pointer-events:none; }
        .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
        @media (max-width:750px){ .chart-wrapper{ height:280px; } }
    </style>
</head>
<body>
<div class="app">
    <div class="sticky-header">
        <div class="tabs-bar" id="tabsBar"></div>
        <div class="nav-bar">
            <h2 class="board-title" contenteditable="true">技改生产数据看板</h2>
            <div style="display:flex; align-items:center; gap:20px; flex-wrap:wrap;">
                <div class="sync-indicator"><span class="sync-dot" id="syncDot"></span><span id="syncText">连接中...</span></div>
                <div style="font-size:11px; opacity:0.8;">制作人：陈港华 · 2026-4-29 · V2.6.1</div>
            </div>
        </div>
        <div class="chart-card">
            <div class="toggle-panel" id="togglePanel"></div>
            <div class="chart-wrapper"><canvas id="mainChart"></canvas></div>
        </div>
    </div>
    <div class="data-card">
        <div class="section-header">
            <span style="font-weight:700;">每日生产记录</span>
            <div style="display:flex; gap:8px;">
                <button class="btn btn-danger" id="btnClearAll">删除全部数据</button>
                <button class="btn" id="btnAdd">添加数据</button>
            </div>
        </div>
        <div class="table-scroll">
            <table id="dataTable">
                <thead><tr>
                    <th>日期</th><th>工序</th><th>生产数量</th><th>外观不良</th><th>功能不良</th><th>不良品率</th>
                    <th>人数</th><th>当日工时</th><th>总工时</th><th>平均小时产能</th><th>UPPH</th><th>工序单价</th><th>操作</th>
                </tr></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>
</div>
<div class="toast" id="toast"></div>

<script>
(function() {
    const SUPABASE_URL = 'https://heialtqbftbmtvgemrld.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_a3OQjdShFybq73P0rzpebg_pM90NvQV';
    const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let users = ['陈港华', '龙波章', '戴腾昭', '蔡旺知'];
    let active = users[0];
    let data = {};
    let chart;
    let pending = false;
    let saveTimer;

    const tabsBar = document.getElementById('tabsBar');
    const tbody = document.getElementById('tableBody');
    const toast = document.getElementById('toast');
    const canvas = document.getElementById('mainChart');
    const dot = document.getElementById('syncDot');
    const txt = document.getElementById('syncText');
    const togglePanel = document.getElementById('togglePanel');

    function showMsg(msg) {
        toast.textContent = msg;
        toast.classList.add('show');
        clearTimeout(window._t);
        window._t = setTimeout(() => toast.classList.remove('show'), 2000);
    }

    async function load(u) {
        dot.className = 'sync-dot syncing'; txt.textContent = '数据库同步中...';
        try {
            const { data: rows, error } = await db.from('production_records').select('*').eq('board', u).order('date', { ascending: true });
            if (error) throw error;
            data[u] = rows ? rows.map(r => ({
                id: r.id, date: r.date, process: r.process,
                prod: r.production_qty || 0, cos: r.cosmetic_defect || 0,
                func: r.functional_defect || 0, workers: r.workers || 0, hrs: r.daily_hours || 0
            })) : [];
            dot.className = 'sync-dot'; txt.textContent = '已连接数据库';
        } catch (e) { console.error(e); dot.className = 'sync-dot error'; txt.textContent = '未连接数据库'; data[u] = []; }
    }

    async function save(u) {
        const rows = data[u] || [];
        if (!rows.length) return;
        const { error } = await db.from('production_records').upsert(rows.map(r => ({
            date: r.date, process: r.process, board: u,
            production_qty: r.prod, cosmetic_defect: r.cos, functional_defect: r.func,
            workers: r.workers, daily_hours: r.hrs
        })), { onConflict: 'date, process, board' });
        if (error) console.error(error);
    }

    function upph(p, w, h) { return (w <= 0 || h <= 0 || p <= 0) ? 0 : p / (w * h); }
    function rate(p, d) { return p <= 0 ? null : (d / p) * 100; }
    function fmtR(v) { return v === null || isNaN(v) ? '-' : v.toFixed(2) + '%'; }
    function fmtV(v, isP) { if (v === null || isNaN(v) || v <= 0) return '-'; return isP ? '¥' + v.toFixed(2) : v.toFixed(2); }

    function render() {
        const rows = data[active] || [];
        tbody.innerHTML = '';
        if (!rows.length) return;

        const grp = {};
        rows.forEach(r => { if (!grp[r.date]) grp[r.date] = []; grp[r.date].push(r); });
        const dates = Object.keys(grp).sort();
        let h = '';

        dates.forEach(d => {
            const day = grp[d].sort((a,b) => ['后焊','组装','包装'].indexOf(a.process) - ['后焊','组装','包装'].indexOf(b.process));
            let tp = 0, tc = 0, tf = 0, tw = 0, th = 0, twh = 0, tpr = 0;
            day.forEach(r => {
                const w = r.workers, hr = r.hrs, wh = w * hr;
                const td = r.cos + r.func;
                const up = upph(r.prod, w, hr);
                const pr = up > 0 ? 20 / up : 0;
                tp += r.prod; tc += r.cos; tf += r.func; tw += w; th += hr; twh += wh; if (up > 0) tpr += pr;
                h += `<tr id="r-${d}-${r.process}">
                    <td>${d}</td><td class="process-name">${r.process}</td>
                    <td><input type="number" value="${r.prod}" data-d="${d}" data-p="${r.process}" data-f="prod"></td>
                    <td><input type="number" value="${r.cos}" data-d="${d}" data-p="${r.process}" data-f="cos"></td>
                    <td><input type="number" value="${r.func}" data-d="${d}" data-p="${r.process}" data-f="func"></td>
                    <td class="calc-cell">${fmtR(rate(r.prod, td))}</td>
                    <td><input type="number" value="${w}" data-d="${d}" data-p="${r.process}" data-f="workers"></td>
                    <td><input type="number" value="${hr}" data-d="${d}" data-p="${r.process}" data-f="hrs"></td>
                    <td class="calc-cell">${wh.toFixed(1)}</td>
                    <td class="calc-cell">${(hr > 0 ? r.prod / hr : 0).toFixed(2)}</td>
                    <td class="calc-cell">${fmtV(up)}</td>
                    <td class="calc-cell">${pr > 0 ? '¥' + pr.toFixed(2) : '-'}</td>
                    <td><button class="btn-del del-p" data-d="${d}" data-p="${r.process}" style="color:var(--red);" title="删除此行">✕</button></td>
                </tr>`;
            });
            const td = tc + tf;
            h += `<tr class="summary-row" id="s-${d}">
                <td colspan="2" style="text-align:right;">${d} 汇总</td>
                <td><strong>${tp}</strong></td><td>${tc}</td><td>${tf}</td><td>${fmtR(rate(tp, td))}</td>
                <td>${tw}</td><td>${th.toFixed(1)}</td><td>${twh.toFixed(1)}</td>
                <td>${(th > 0 ? tp / th : 0).toFixed(2)}</td><td>${fmtV(upph(tp, tw, th))}</td>
                <td><strong>¥${tpr.toFixed(2)}</strong></td>
                <td><button class="btn-del del-d" data-d="${d}" style="color:var(--red);" title="删除这天">✕</button></td>
            </tr>`;
        });

        h += `<tr class="grand-total-row" id="gt"><td colspan="2" style="text-align:right;">全部汇总</td><td>0</td><td>0</td><td>0</td><td>-</td><td>-</td><td>0</td><td>0</td><td>0</td><td>-</td><td>-</td><td></td></tr>`;
        tbody.innerHTML = h;
        bindEvts();
        updateGT();
    }

    function updateGT() {
        const all = data[active] || [];
        const gt = document.getElementById('gt');
        if (!gt) return;
        if (!all.length) { gt.style.display = 'none'; return; }
        gt.style.display = '';

        let totalProd = 0, totalCos = 0, totalFunc = 0, totalDailyHours = 0, totalWorkHours = 0;
        const dailyPriceMap = {};

        all.forEach(r => {
            totalProd += r.prod;
            totalCos += r.cos;
            totalFunc += r.func;
            totalDailyHours += r.hrs;
            totalWorkHours += r.workers * r.hrs;
            const up = upph(r.prod, r.workers, r.hrs);
            const pr = up > 0 ? 20 / up : 0;
            if (!dailyPriceMap[r.date]) dailyPriceMap[r.date] = 0;
            dailyPriceMap[r.date] += pr;
        });

        const totalDefect = totalCos + totalFunc;
        const allRate = rate(totalProd, totalDefect);
        const avgHourAll = totalDailyHours > 0 ? totalProd / totalDailyHours : 0;
        const allUPPH = upph(totalProd, 1, totalDailyHours);
        const dayCount = Object.keys(dailyPriceMap).length;
        let sumPrice = 0;
        Object.values(dailyPriceMap).forEach(v => sumPrice += v);
        const avgPrice = dayCount > 0 ? sumPrice / dayCount : 0;

        gt.children[2].textContent = totalProd;
        gt.children[3].textContent = totalCos;
        gt.children[4].textContent = totalFunc;
        gt.children[5].textContent = fmtR(allRate);
        gt.children[6].textContent = '-';
        gt.children[7].textContent = totalDailyHours.toFixed(1);
        gt.children[8].textContent = totalWorkHours.toFixed(1);
        gt.children[9].textContent = avgHourAll.toFixed(2);
        gt.children[10].textContent = fmtV(allUPPH);
        gt.children[11].textContent = '¥' + avgPrice.toFixed(2);
    }

    function bindEvts() {
        document.querySelectorAll('input').forEach(i => {
            i.addEventListener('input', function(e) {
                const el = e.target;
                const row = (data[active] || []).find(r => r.date === el.dataset.d && r.process === el.dataset.p);
                if (!row) return;
                row[el.dataset.f] = parseFloat(el.value) || 0;
                updRow(el.dataset.d, el.dataset.p);
                updSum(el.dataset.d);
                updateGT();
                clearTimeout(saveTimer);
                saveTimer = setTimeout(() => { pending = true; save(active).then(() => pending = false); }, 500);
            });
            i.addEventListener('focus', function() { this.select(); });
        });

        document.querySelectorAll('.del-p').forEach(b => b.addEventListener('click', async function() {
            if (!confirm('删除记录？')) return;
            const row = (data[active] || []).find(r => r.date === this.dataset.d && r.process === this.dataset.p);
            if (row && row.id) await db.from('production_records').delete().eq('id', row.id);
            data[active] = (data[active] || []).filter(r => !(r.date === this.dataset.d && r.process === this.dataset.p));
            render(); updChart();
        }));

        document.querySelectorAll('.del-d').forEach(b => b.addEventListener('click', async function() {
            if (!confirm('删除全天？')) return;
            const rows = (data[active] || []).filter(r => r.date === this.dataset.d);
            for (const r of rows) if (r.id) await db.from('production_records').delete().eq('id', r.id);
            data[active] = (data[active] || []).filter(r => r.date !== this.dataset.d);
            render(); updChart();
        }));
    }

    function updRow(d, p) {
        const row = (data[active] || []).find(r => r.date === d && r.process === p);
        if (!row) return;
        const tr = document.getElementById('r-' + d + '-' + p);
        if (!tr) return;
        const up = upph(row.prod, row.workers, row.hrs);
        const pr = up > 0 ? 20 / up : 0;
        tr.children[5].textContent = fmtR(rate(row.prod, row.cos + row.func));
        tr.children[8].textContent = (row.workers * row.hrs).toFixed(1);
        tr.children[9].textContent = (row.hrs > 0 ? row.prod / row.hrs : 0).toFixed(2);
        tr.children[10].textContent = fmtV(up);
        tr.children[11].textContent = pr > 0 ? '¥' + pr.toFixed(2) : '-';
    }

    function updSum(d) {
        const rows = (data[active] || []).filter(r => r.date === d);
        if (!rows.length) return;
        const tr = document.getElementById('s-' + d);
        if (!tr) return;
        let tp = 0, tc = 0, tf = 0, tw = 0, th = 0, twh = 0, tpr = 0;
        rows.forEach(r => {
            tp += r.prod; tc += r.cos; tf += r.func; tw += r.workers; th += r.hrs; twh += r.workers * r.hrs;
            const up = upph(r.prod, r.workers, r.hrs);
            if (up > 0) tpr += 20 / up;
        });
        tr.children[2].textContent = tp; tr.children[3].textContent = tc; tr.children[4].textContent = tf;
        tr.children[5].textContent = fmtR(rate(tp, tc + tf));
        tr.children[6].textContent = tw; tr.children[7].textContent = th.toFixed(1); tr.children[8].textContent = twh.toFixed(1);
        tr.children[9].textContent = (th > 0 ? tp / th : 0).toFixed(2);
        tr.children[10].textContent = fmtV(upph(tp, tw, th));
        tr.children[11].textContent = '¥' + tpr.toFixed(2);
    }

    async function addDay() {
        const today = new Date().toISOString().split('T')[0];
        const d = prompt('日期 (YYYY-MM-DD)：', today);
        if (!d || !/^\d{4}-\d{2}-\d{2}$/.test(d)) return;
        if ((data[active] || []).some(r => r.date === d)) { showMsg('已存在'); return; }
        const rows = ['后焊','组装','包装'].map(p => ({ date: d, process: p, prod: 0, cos: 0, func: 0, workers: 0, hrs: 0 }));
        data[active] = (data[active] || []).concat(rows);
        await save(active);
        await load(active);
        render(); updChart();
    }

    async function clearAll() {
        if (!confirm('删除全部数据？')) return;
        await db.from('production_records').delete().eq('board', active);
        data[active] = [];
        render(); updChart();
    }

    function prepChart() {
        const rows = data[active] || [];
        const map = {};
        rows.forEach(r => {
            if (!map[r.date]) map[r.date] = { 后焊:0, 组装:0, 包装:0, cos:0, func:0, w:0, h:0 };
            map[r.date][r.process] += r.prod;
            map[r.date].cos += r.cos; map[r.date].func += r.func;
            map[r.date].w += r.workers; map[r.date].h += r.hrs;
        });
        const dates = Object.keys(map).sort();
        const s = { dates, 后焊:[], 组装:[], 包装:[], total:[], cos:[], func:[], td:[], rate:[], upph:[], price:[] };
        dates.forEach(d => {
            const v = map[d];
            s.后焊.push(v.后焊); s.组装.push(v.组装); s.包装.push(v.包装);
            const tp = v.后焊 + v.组装 + v.包装;
            s.total.push(tp); s.cos.push(v.cos); s.func.push(v.func);
            const td = v.cos + v.func;
            s.td.push(td); s.rate.push(tp > 0 ? +(td / tp * 100).toFixed(2) : null);
            const u = tp > 0 && v.w > 0 && v.h > 0 ? tp / (v.w * v.h) : 0;
            s.upph.push(u > 0 ? +u.toFixed(2) : null);
            let pr = 0;
            rows.filter(r => r.date === d).forEach(r => {
                const up = upph(r.prod, r.workers, r.hrs);
                if (up > 0) pr += 20 / up;
            });
            s.price.push(+pr.toFixed(2));
        });
        return s;
    }

    function updChart() {
        if (!chart) initChart();
        const s = prepChart();
        chart.data.labels = s.dates;
        const keys = ['后焊','组装','包装','total','cos','func','td','rate','upph','price'];
        chart.data.datasets.forEach((ds, i) => { ds.data = s[keys[i]]; });
        chart.update();
    }

    function initChart() {
        if (chart) chart.destroy();
        const s = prepChart();
        const labels = ['后焊','组装','包装','总产量','外观不良','功能不良','不良品总数','不良品率','UPPH','总单价'];
        const colors = ['#FF4500','#00CED1','#1E90FF','#000000','#DC143C','#8B008B','#FF1493','#FFD700','#00FF7F','#FF69B4'];
        const dashes = [[], [], [], [], [], [], [], [5,2], [3,3], [6,2]];
        const yAxes = ['y','y','y','y','y','y','y','y1','y1','y1'];
        const datasets = labels.map((l, i) => ({
            label: l,
            data: s[['后焊','组装','包装','total','cos','func','td','rate','upph','price'][i]],
            borderColor: colors[i],
            borderWidth: i === 3 ? 3 : 2.5,
            borderDash: dashes[i],
            tension: 0.3,
            yAxisID: yAxes[i],
            pointRadius: 2,
            pointHoverRadius: 5,
            fill: false
        }));

        chart = new Chart(canvas, {
            type: 'line',
            data: { labels: s.dates, datasets },
            options: {
                responsive: true, maintainAspectRatio: false,
                interaction: { mode: 'index', intersect: false },
                plugins: {
                    legend: { display: true, position: 'top', labels: { usePointStyle: true, boxWidth: 8, font: { size: 11 } } }
                },
                scales: {
                    x: { grid: { display: false } },
                    y: { type: 'linear', position: 'left', title: { display: true, text: '数量' }, beginAtZero: true },
                    y1: { type: 'linear', position: 'right', title: { display: true, text: '比率/UPPH/单价' }, grid: { display: false }, beginAtZero: true }
                }
            }
        });
        buildTogglePanel();
    }

    function buildTogglePanel() {
        const labels = ['后焊','组装','包装','总产量','外观不良','功能不良','不良品总数','不良品率','UPPH','总单价'];
        togglePanel.innerHTML = '<span style="font-weight:600; margin-right:8px;">显示线条：</span>';
        labels.forEach((l, i) => {
            togglePanel.innerHTML += `<label><input type="checkbox" checked data-idx="${i}"> ${l}</label>`;
        });
        document.querySelectorAll('#togglePanel input').forEach(cb => {
            cb.addEventListener('change', function() {
                if (!chart) return;
                const idx = parseInt(this.dataset.idx);
                chart.setDatasetVisibility(idx, this.checked);
                chart.update();
            });
        });
    }

    function renderTabs() {
        tabsBar.innerHTML = users.map(u => `<button class="tab ${u === active ? 'active' : ''}" data-u="${u}">${u}<span class="edit-tab">✎</span>${users.length > 1 ? '<span class="close-tab">×</span>' : ''}</button>`).join('') + '<button class="add-tab-btn">+</button>';
        tabsBar.querySelectorAll('.tab').forEach(b => b.addEventListener('click', e => {
            if (e.target.classList.contains('edit-tab') || e.target.classList.contains('close-tab')) return;
            switchUser(b.dataset.u);
        }));
        tabsBar.querySelectorAll('.edit-tab').forEach(s => s.addEventListener('click', e => {
            e.stopPropagation();
            const old = s.parentElement.dataset.u;
            const n = prompt('新名称：', old);
            if (n && n.trim() && n !== old && !users.includes(n.trim())) {
                data[n] = data[old] || [];
                delete data[old];
                users = users.map(u => u === old ? n.trim() : u);
                if (active === old) active = n.trim();
                renderTabs(); render(); updChart();
            }
        }));
        tabsBar.querySelectorAll('.close-tab').forEach(s => s.addEventListener('click', async e => {
            e.stopPropagation();
            const u = s.parentElement.dataset.u;
            if (!confirm('删除页面？')) return;
            await db.from('production_records').delete().eq('board', u);
            delete data[u];
            users = users.filter(b => b !== u);
            if (active === u) active = users[0];
            renderTabs(); render(); updChart();
        }));
        tabsBar.querySelector('.add-tab-btn').addEventListener('click', () => {
            const n = prompt('新页面：');
            if (!n || !n.trim() || users.includes(n.trim())) return;
            users.push(n.trim());
            active = n.trim();
            data[active] = [];
            renderTabs(); render(); updChart();
        });
    }

    async function switchUser(u) {
        if (u === active) return;
        active = u;
        if (!data[active]) await load(active);
        renderTabs(); render(); updChart();
        dot.className = 'sync-dot'; txt.textContent = '数据库已连接';
    }

    async function start() {
        for (const u of users) await load(u);
        active = users[0];
        renderTabs(); render(); initChart(); updChart();
        dot.className = 'sync-dot'; txt.textContent = '数据库已连接';
        db.channel('pub').on('postgres_changes', { event: '*', schema: 'public', table: 'production_records' }, async () => {
            if (pending) return;
            await load(active);
            render(); updChart();
        }).subscribe();
    }

    document.getElementById('btnAdd').addEventListener('click', addDay);
    document.getElementById('btnClearAll').addEventListener('click', clearAll);
    start();
})();
</script>
</body>
</html>
