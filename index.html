<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="生产数据看板，每日记录生产数量、外观不良、功能不良、人数、工时、单价，自动计算不良品率和UPPH，折线图趋势分析，Supabase实时多设备同步">
    <title>生产数据看板 · UPPH与不良品率追踪</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.8/dist/chart.umd.min.js">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
    </script>
    <style>
        :root {
            --bg: #f2f2f7;
            --card-bg: #ffffff;
            --border: #e0e0e0;
            --blue: #007AFF;
            --red: #FF3B30;
            --orange: #FF9500;
            --green: #34C759;
            --purple: #AF52DE;
            --teal: #5AC8FA;
            --pink: #FF2D55;
            --text: #000000;
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.06);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.08);
            --radius-sm: 10px;
            --radius-md: 16px;
            --radius-lg: 20px;
            --font: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', 'PingFang SC', 'Helvetica Neue', sans-serif;
            --transition: 0.2s cubic-bezier(0.25, 0.1, 0.25, 1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--font);
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 16px 12px 40px;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
        }
        .app-container {
            width: 100%;
            max-width: 1100px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .nav-bar {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            padding: 14px 20px;
            box-shadow: var(--shadow-sm);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
            border: 1px solid var(--border);
        }
        .nav-left { display: flex; align-items: center; gap: 10px; }
        .nav-left .icon-chart { font-size: 24px; }
        .nav-left h1 { font-size: 18px; font-weight: 700; color: #000; }
        .nav-right { display: flex; align-items: flex-end; gap: 20px; flex-wrap: wrap; }
        .sync-indicator {
            display: flex; align-items: center; gap: 6px;
            font-size: 11px; font-weight: 500; opacity: 0.7;
            padding: 4px 10px; background: #f5f5f7; border-radius: 12px;
        }
        .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: #34C759; transition: background 0.3s; }
        .sync-dot.syncing { background: #FF9500; animation: pulse 0.8s infinite; }
        .sync-dot.error { background: #FF3B30; }
        @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.3;} }
        .maker-info { display: flex; flex-direction: column; align-items: flex-end; gap: 3px; font-size: 11px; font-weight: 500; opacity: 0.8; line-height: 1.3; }
        .maker-info .version-line { font-weight: 700; font-size: 12px; }
        .chart-card { background: var(--card-bg); border-radius: var(--radius-lg); padding: 16px 14px 10px; box-shadow: var(--shadow-md); border: 1px solid var(--border); }
        .chart-wrapper { width: 100%; height: 400px; }
        .chart-wrapper canvas { width: 100% !important; height: 100% !important; }
        .chart-legend-hint { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; margin-top: 8px; font-size: 11px; }
        .chart-legend-hint span { display: flex; align-items: center; gap: 4px; font-weight: 500; }
        .dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; }
        .dot-blue { background: #007AFF; } .dot-red { background: #FF3B30; } .dot-orange { background: #FF9500; }
        .dot-green { background: #34C759; } .dot-purple { background: #AF52DE; } .dot-teal { background: #5AC8FA; } .dot-pink { background: #FF2D55; }
        .data-card { background: var(--card-bg); border-radius: var(--radius-lg); padding: 16px 14px; box-shadow: var(--shadow-md); border: 1px solid var(--border); display: flex; flex-direction: column; gap: 12px; }
        .section-header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
        .section-title { font-size: 16px; font-weight: 700; display: flex; align-items: center; gap: 7px; }
        .toolbar { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; }
        .search-box { display: flex; align-items: center; gap: 8px; background: #f5f5f7; border-radius: 20px; padding: 6px 14px; border: 1px solid #d0d0d0; max-width: 180px; }
        .search-box input { border: none; background: transparent; outline: none; font-size: 13px; font-family: var(--font); color: #000; width: 100%; min-width: 80px; }
        .search-box input::placeholder { color: #8e8e93; }
        .search-icon { font-size: 14px; opacity: 0.6; }
        .btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 18px; border-radius: 24px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; color: #fff; background: var(--blue); transition: all var(--transition); font-family: var(--font); white-space: nowrap; box-shadow: 0 2px 8px rgba(0, 122, 255, 0.25); }
        .btn:hover { background: #0066d6; transform: translateY(-1px); }
        .btn:active { transform: scale(0.96); }
        .btn-outline { background: #fff; color: var(--blue); border: 1.5px solid var(--blue); box-shadow: none; }
        .btn-outline:hover { background: #e8f0fe; }
        .btn-delete { background: #fff; color: #000; border: 1.5px solid #d0d0d0; box-shadow: none; padding: 7px 12px; border-radius: 20px; font-size: 13px; font-weight: 500; }
        .btn-delete:hover { background: #f5f5f5; }
        .table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; border-radius: var(--radius-sm); border: 1px solid var(--border); background: #fafafa; }
        .table-scroll::-webkit-scrollbar { height: 5px; }
        .table-scroll::-webkit-scrollbar-thumb { background: #c8c8c8; border-radius: 5px; }
        table { width: 100%; border-collapse: collapse; min-width: 1050px; font-size: 13px; color: #000; }
        table thead th { background: #f5f5f7; padding: 11px 6px; text-align: center; font-weight: 700; font-size: 11px; border-bottom: 2px solid #d0d0d0; white-space: nowrap; }
        table tbody td { padding: 7px 4px; text-align: center; border-bottom: 1px solid #ececec; background: #fff; }
        table tbody tr:hover td { background: #f9f9fb; }
        table input[type="date"], table input[type="number"] { width: 100%; min-width: 60px; max-width: 120px; padding: 8px 4px; border: 1.5px solid #dcdcdc; border-radius: 8px; font-size: 12px; font-family: var(--font); color: #000; text-align: center; transition: all var(--transition); -webkit-appearance: none; }
        table input[type="date"] { min-width: 115px; max-width: 135px; cursor: pointer; }
        table input:focus { outline: none; border-color: var(--blue); box-shadow: 0 0 0 3px rgba(0,122,255,0.12); }
        .cell-calculated { display: inline-block; padding: 7px 8px; border-radius: 8px; font-weight: 600; font-size: 13px; color: #000; min-width: 50px; }
        .cell-calculated.total-defect { background: #f5e6f5; } .cell-calculated.rate { background: #fff3e8; }
        .cell-calculated.upph { background: #eaf7ee; } .cell-calculated.price { background: #e8f0fe; }
        .no-data-msg { text-align: center; padding: 30px; font-size: 14px; font-weight: 500; opacity: 0.6; }
        .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-120px); background: #1c1c1e; color: #fff; padding: 10px 22px; border-radius: 24px; font-size: 14px; font-weight: 600; z-index: 9999; pointer-events: none; opacity: 0; transition: all 0.35s cubic-bezier(0.25,0.1,0.25,1); font-family: var(--font); }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        @media (max-width: 750px) {
            .chart-wrapper { height: 280px; }
            .btn { padding: 8px 12px; font-size: 12px; }
            table { font-size: 11px; min-width: 850px; }
            .search-box { max-width: 120px; }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="nav-bar">
        <div class="nav-left"><span class="icon-chart">📊</span><h1>生产数据看板</h1></div>
        <div class="nav-right">
            <div class="sync-indicator" id="syncIndicator"><span class="sync-dot" id="syncDot"></span><span id="syncText">连接中...</span></div>
            <div class="maker-info"><span>软件制作人：陈港华</span><span>制作日期：2021-12-7</span><span class="version-line">V3.1 · 实时同步</span></div>
        </div>
    </div>
    <div class="chart-card">
        <div class="chart-wrapper"><canvas id="mainChart"></canvas></div>
        <div class="chart-legend-hint">
            <span><span class="dot dot-blue"></span>生产数量</span>
            <span><span class="dot dot-purple"></span>外观不良</span>
            <span><span class="dot dot-teal"></span>功能不良</span>
            <span><span class="dot dot-red"></span>不良品总数</span>
            <span><span class="dot dot-orange"></span>不良品率(%)</span>
            <span><span class="dot dot-green"></span>UPPH</span>
            <span><span class="dot dot-pink"></span>单价(元)</span>
        </div>
    </div>
    <div class="data-card">
        <div class="section-header">
            <div class="section-title"><span class="icon">📋</span>每日生产记录</div>
            <div class="toolbar">
                <div class="search-box"><span class="search-icon">🔍</span><input type="text" id="searchInput" placeholder="按日期筛选..." autocomplete="off"></div>
                <button class="btn btn-outline" id="btnRefresh">🔄 刷新</button>
                <button class="btn" id="btnAdd">＋ 添加</button>
            </div>
        </div>
        <div class="table-scroll" id="tableScroll">
            <table><thead><tr><th>日期</th><th>生产数量</th><th>外观不良</th><th>功能不良</th><th>不良品总数</th><th>不良品率</th><th>人数</th><th>工时(h)</th><th>UPPH</th><th>单价(元)</th><th>操作</th></tr></thead><tbody id="tableBody"></tbody></table>
        </div>
        <div class="no-data-msg" id="noDataMsg" style="display:none;">暂无记录，点击"添加"开始录入</div>
    </div>
</div>
<div class="toast" id="toast"></div>

<script>
(function() {
    const SUPABASE_URL = 'https://heialtqbftbmtvgemrld.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_a3OQjdShFybq73P0rzpebg_pM90NvQV';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    const tableBody = document.getElementById('tableBody');
    const noDataMsg = document.getElementById('noDataMsg');
    const tableScroll = document.getElementById('tableScroll');
    const btnAdd = document.getElementById('btnAdd');
    const btnRefresh = document.getElementById('btnRefresh');
    const toastEl = document.getElementById('toast');
    const chartCanvas = document.getElementById('mainChart');
    const searchInput = document.getElementById('searchInput');
    const syncDot = document.getElementById('syncDot');
    const syncText = document.getElementById('syncText');
    
    let records = [];
    let chartInstance = null;
    let debounceTimer = null;
    let isRenderingTable = false;
    let filterText = '';
    let pendingSync = false;

    function setSyncStatus(s) {
        syncDot.className = 'sync-dot';
        if(s==='syncing') { syncDot.classList.add('syncing'); syncText.textContent='同步中...'; }
        else if(s==='connected') { syncText.textContent='已连接'; }
        else if(s==='error') { syncDot.classList.add('error'); syncText.textContent='连接失败'; }
        else { syncDot.classList.add('error'); syncText.textContent='离线'; }
    }
    function showToast(msg, d=2000) {
        if(window.toastTimer) clearTimeout(window.toastTimer);
        toastEl.textContent=msg; toastEl.classList.add('show');
        window.toastTimer=setTimeout(()=>{toastEl.classList.remove('show');},d);
    }
    function calcTotalDefect(c,f) { return (parseFloat(c)||0)+(parseFloat(f)||0); }
    function calcDefectRate(p,t) { const pp=parseFloat(p)||0; if(pp<=0)return null; return (t/pp)*100; }
    function calcUPPH(p,w,h) { const pp=parseFloat(p)||0; const ww=parseFloat(w)||0; const hh=parseFloat(h)||0; const d=ww*hh; if(d<=0)return null; return pp/d; }
    function calcPrice(h,p) { const hh=parseFloat(h)||0; const pp=parseFloat(p)||0; if(pp<=0)return null; return (hh*20)/pp; }
    function fmtRate(v){ return v===null||v===undefined||isNaN(v)?'-':v.toFixed(2)+'%'; }
    function fmtUPPH(v){ return v===null||v===undefined||isNaN(v)?'-':v.toFixed(2); }
    function fmtPrice(v){ return v===null||v===undefined||isNaN(v)?'-':'¥'+v.toFixed(2); }

    async function loadFromSupabase() {
        setSyncStatus('syncing');
        try {
            const {data,error}=await supabase.from('production_records').select('*').order('date',{ascending:true});
            if(error)throw error;
            records = data ? data.map(r=>({id:r.id,date:r.date,productionQty:r.production_qty||0,cosmeticDefect:r.cosmetic_defect||0,functionalDefect:r.functional_defect||0,workers:r.workers||0,hours:r.hours||0})) : [];
            setSyncStatus('connected');
        } catch(e) { console.error(e); setSyncStatus('error'); records=[]; }
    }

    async function saveRecord(r) {
        const d={date:r.date,production_qty:r.productionQty,cosmetic_defect:r.cosmeticDefect,functional_defect:r.functionalDefect,workers:r.workers,hours:r.hours};
        const {data,error}=await supabase.from('production_records').upsert(d,{onConflict:'date'}).select().single();
        if(error)throw error;
        return data;
    }

    async function deleteRecord(id) {
        const {error}=await supabase.from('production_records').delete().eq('id',id);
        if(error)throw error;
    }

    function subscribeRealtime() {
        supabase.channel('production_changes')
            .on('postgres_changes',{event:'*',schema:'public',table:'production_records'},()=>{
                if(pendingSync)return;
                loadFromSupabase().then(()=>{renderTable();updateChart();});
            }).subscribe((s)=>{ if(s==='SUBSCRIBED')setSyncStatus('connected'); else if(s==='CHANNEL_ERROR')setSyncStatus('error'); });
    }

    function getFiltered() {
        if(!filterText.trim())return records;
        const l=filterText.trim().toLowerCase();
        return records.filter(r=>(r.date||'').toLowerCase().includes(l));
    }

    function renderTable() {
        isRenderingTable=true; tableBody.innerHTML='';
        const f=getFiltered();
        if(!f.length){ noDataMsg.style.display='block'; tableScroll.style.display='none'; isRenderingTable=false; return; }
        noDataMsg.style.display='none'; tableScroll.style.display='block';
        f.forEach(r=>{
            const t=calcTotalDefect(r.cosmeticDefect,r.functionalDefect);
            const rate=calcDefectRate(r.productionQty,t);
            const upph=calcUPPH(r.productionQty,r.workers,r.hours);
            const price=calcPrice(r.hours,r.productionQty);
            const tr=document.createElement('tr');
            tr.setAttribute('data-record-id',r.id);
            tr.innerHTML=`<td><input type="date" class="inp-date" value="${r.date||''}" data-field="date" data-id="${r.id}"></td>
            <td><input type="number" class="inp-num inp-prod" value="${r.productionQty??0}" data-field="productionQty" data-id="${r.id}"></td>
            <td><input type="number" class="inp-num inp-cosmetic" value="${r.cosmeticDefect??0}" data-field="cosmeticDefect" data-id="${r.id}"></td>
            <td><input type="number" class="inp-num inp-functional" value="${r.functionalDefect??0}" data-field="functionalDefect" data-id="${r.id}"></td>
            <td><span class="cell-calculated total-defect">${t}</span></td>
            <td><span class="cell-calculated rate">${fmtRate(rate)}</span></td>
            <td><input type="number" class="inp-num inp-workers" value="${r.workers??0}" data-field="workers" data-id="${r.id}"></td>
            <td><input type="number" class="inp-num inp-hours" value="${r.hours??0}" step="0.5" data-field="hours" data-id="${r.id}"></td>
            <td><span class="cell-calculated upph">${fmtUPPH(upph)}</span></td>
            <td><span class="cell-calculated price">${fmtPrice(price)}</span></td>
            <td><button class="btn-delete btn-del-row" data-id="${r.id}">🗑</button></td>`;
            tableBody.appendChild(tr);
        });
        bindEvents(); isRenderingTable=false;
    }

    function bindEvents() {
        tableBody.querySelectorAll('input').forEach(inp=>{
            const n=inp.cloneNode(true); inp.parentNode.replaceChild(n,inp);
            n.addEventListener('input',function(){handleInput(this);});
            n.addEventListener('change',function(){handleBlur(this);});
        });
        tableBody.querySelectorAll('.btn-del-row').forEach(b=>{
            const n=b.cloneNode(true); b.parentNode.replaceChild(n,b);
            n.addEventListener('click',function(){handleDelete(parseInt(this.dataset.id));});
        });
    }

    function updateCalcRow(rid) {
        const tr=tableBody.querySelector(`tr[data-record-id="${rid}"]`); if(!tr)return;
        const p=parseFloat(tr.querySelector('.inp-prod')?.value)||0;
        const c=parseFloat(tr.querySelector('.inp-cosmetic')?.value)||0;
        const f=parseFloat(tr.querySelector('.inp-functional')?.value)||0;
        const w=parseFloat(tr.querySelector('.inp-workers')?.value)||0;
        const h=parseFloat(tr.querySelector('.inp-hours')?.value)||0;
        const t=c+f;
        tr.querySelector('.total-defect').textContent=t;
        tr.querySelector('.rate').textContent=fmtRate(calcDefectRate(p,t));
        tr.querySelector('.upph').textContent=fmtUPPH(calcUPPH(p,w,h));
        tr.querySelector('.price').textContent=fmtPrice(calcPrice(h,p));
    }

    function handleInput(inp) {
        if(isRenderingTable)return;
        updateCalcRow(parseInt(inp.dataset.id));
        if(debounceTimer)clearTimeout(debounceTimer);
        debounceTimer=setTimeout(()=>{syncRow(parseInt(inp.dataset.id));},800);
    }
    function handleBlur(inp) {
        if(debounceTimer)clearTimeout(debounceTimer);
        syncRow(parseInt(inp.dataset.id));
    }

    async function syncRow(rid) {
        const tr=tableBody.querySelector(`tr[data-record-id="${rid}"]`); if(!tr)return;
        const date=tr.querySelector('.inp-date')?.value; if(!date)return;
        const r={id:rid,date,productionQty:parseFloat(tr.querySelector('.inp-prod')?.value)||0,
            cosmeticDefect:parseFloat(tr.querySelector('.inp-cosmetic')?.value)||0,
            functionalDefect:parseFloat(tr.querySelector('.inp-functional')?.value)||0,
            workers:parseFloat(tr.querySelector('.inp-workers')?.value)||0,
            hours:parseFloat(tr.querySelector('.inp-hours')?.value)||0};
        try{ pendingSync=true; setSyncStatus('syncing'); await saveRecord(r); setSyncStatus('connected'); }
        catch{ setSyncStatus('error'); showToast('⚠️同步失败'); }
        finally{ pendingSync=false; updateChart(); }
    }

    async function handleDelete(rid) {
        if(!confirm('确定删除？'))return;
        try{ setSyncStatus('syncing'); await deleteRecord(rid); await loadFromSupabase(); renderTable(); updateChart(); setSyncStatus('connected'); showToast('已删除'); }
        catch{ setSyncStatus('error'); }
    }

    async function addRecord() {
        const today=new Date().toISOString().split('T')[0];
        if(records.some(r=>r.date===today)){ showToast('今日已有记录'); return; }
        try{ setSyncStatus('syncing'); await saveRecord({date:today,productionQty:0,cosmeticDefect:0,functionalDefect:0,workers:0,hours:0});
            await loadFromSupabase(); renderTable(); updateChart(); setSyncStatus('connected'); showToast('已添加'); }
        catch{ setSyncStatus('error'); }
    }

    function updateChart() {
        if(!chartInstance)initChart();
        const d=prepareChartData();
        chartInstance.data.labels=d.labels;
        chartInstance.data.datasets[0].data=d.prod;
        chartInstance.data.datasets[1].data=d.cosmetic;
        chartInstance.data.datasets[2].data=d.functional;
        chartInstance.data.datasets[3].data=d.total;
        chartInstance.data.datasets[4].data=d.rate;
        chartInstance.data.datasets[5].data=d.upph;
        chartInstance.data.datasets[6].data=d.price;
        chartInstance.update();
    }

    function prepareChartData() {
        const l=[],p=[],c=[],f=[],t=[],r=[],u=[],pr=[];
        records.forEach(rr=>{
            l.push(rr.date); p.push(rr.productionQty); c.push(rr.cosmeticDefect); f.push(rr.functionalDefect);
            const tt=calcTotalDefect(rr.cosmeticDefect,rr.functionalDefect); t.push(tt);
            const rate=calcDefectRate(rr.productionQty,tt); r.push(rate!==null?+rate.toFixed(2):null);
            const upph=calcUPPH(rr.productionQty,rr.workers,rr.hours); u.push(upph!==null?+upph.toFixed(2):null);
            const price=calcPrice(rr.hours,rr.productionQty); pr.push(price!==null?+price.toFixed(2):null);
        });
        return {labels:l,prod:p,cosmetic:c,functional:f,total:t,rate:r,upph:u,price:pr};
    }

    function initChart() {
        if(chartInstance)chartInstance.destroy();
        const d=prepareChartData();
        chartInstance=new Chart(chartCanvas,{type:'line',data:{labels:d.labels,datasets:[
            {label:'生产数量',data:d.prod,borderColor:'#007AFF',borderWidth:2.5,tension:0.35,fill:true,pointRadius:4,yAxisID:'y'},
            {label:'外观不良',data:d.cosmetic,borderColor:'#AF52DE',borderWidth:2.5,tension:0.35,fill:false,pointRadius:4,yAxisID:'y'},
            {label:'功能不良',data:d.functional,borderColor:'#5AC8FA',borderWidth:2.5,tension:0.35,fill:false,pointRadius:4,yAxisID:'y'},
            {label:'不良品总数',data:d.total,borderColor:'#FF3B30',borderWidth:2.5,borderDash:[4,2],tension:0.35,fill:false,pointRadius:4,yAxisID:'y'},
            {label:'不良品率(%)',data:d.rate,borderColor:'#FF9500',borderWidth:2.5,borderDash:[6,2],tension:0.35,fill:false,pointRadius:4,yAxisID:'y1'},
            {label:'UPPH',data:d.upph,borderColor:'#34C759',borderWidth:2.5,borderDash:[3,3],tension:0.35,fill:false,pointRadius:4,yAxisID:'y1'},
            {label:'单价(元)',data:d.price,borderColor:'#FF2D55',borderWidth:2.5,borderDash:[5,3],tension:0.35,fill:false,pointRadius:4,yAxisID:'y1'},
        ]},options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
            plugins:{legend:{labels:{color:'#000',usePointStyle:true,boxWidth:10,font:{size:11}}}},
            scales:{x:{grid:{display:false}},y:{type:'linear',position:'left',title:{display:true,text:'数量'},beginAtZero:true},
                y1:{type:'linear',position:'right',title:{display:true,text:'比率/UPPH/单价'},grid:{display:false},beginAtZero:true}}}});
    }

    btnAdd.addEventListener('click',addRecord);
    btnRefresh.addEventListener('click',async()=>{await loadFromSupabase();renderTable();updateChart();showToast('已刷新');});
    searchInput.addEventListener('input',function(){filterText=this.value;renderTable();});

    (async function init(){
        await loadFromSupabase();
        renderTable();
        initChart();
        updateChart();
        subscribeRealtime();
        if(!records.length){noDataMsg.style.display='block';tableScroll.style.display='none';}
    })();
})();
</script>
